        const { useState, useEffect, useMemo, useCallback } = React;

        // ==========================================
        // HISTORY HOOK
        // ==========================================
        function useHistory(key, maxItems = 20) {
            const [history, setHistory] = useState(() => {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : [];
                } catch (error) {
                    return [];
                }
            });

            const addHistory = (val) => {
                if (!val || val.trim() === '') return;
                setHistory(prev => {
                    const filtered = prev.filter(item => item !== val);
                    const next = [val, ...filtered].slice(0, maxItems);
                    localStorage.setItem(key, JSON.stringify(next));
                    return next;
                });
            };

            const clearHistory = () => {
                setHistory([]);
                localStorage.removeItem(key);
            };

            return { history, addHistory, clearHistory };
        }

        // ==========================================
        // UTILITY FUNCTIONS (BigInt Powered for IPv4 & IPv6)
        // ==========================================
        
        const parseIp = (str) => {
            if (!str) return null;
            str = str.trim();
            if (str.includes(':')) {
                let parts = str.split('::');
                if (parts.length > 2) return null;
                let left = parts[0] ? parts[0].split(':') : [];
                let right = parts.length === 2 && parts[1] ? parts[1].split(':') : [];
                let missing = 8 - (left.length + right.length);
                if (missing < 0) return null;
                let full = [...left];
                for(let i=0; i<missing; i++) full.push('0');
                full = full.concat(right);
                if (full.length !== 8) return null;
                
                let longVal = 0n;
                for(let i=0; i<8; i++) {
                    let hex = full[i] || '0';
                    if (hex === '') hex = '0';
                    let val = parseInt(hex, 16);
                    if (isNaN(val) || val < 0 || val > 0xffff) return null;
                    longVal = (longVal << 16n) | BigInt(val);
                }
                return { version: 6, long: longVal };
            } else {
                const parts = str.split('.');
                if (parts.length !== 4) return null;
                let longVal = 0n;
                for (let i = 0; i < 4; i++) {
                    const val = parseInt(parts[i], 10);
                    if (isNaN(val) || val < 0 || val > 255) return null;
                    longVal = (longVal << 8n) | BigInt(val);
                }
                return { version: 4, long: longVal };
            }
        };

        const formatIp = (longVal, version) => {
            if (version === 6) {
                let parts = [];
                for (let i = 0; i < 8; i++) {
                    let shift = BigInt((7 - i) * 16);
                    let block = (longVal >> shift) & 0xffffn;
                    parts.push(block.toString(16));
                }
                let bestStart = -1, bestLen = 0, currentStart = -1, currentLen = 0;
                for (let i = 0; i < 8; i++) {
                    if (parts[i] === '0') {
                        if (currentStart === -1) currentStart = i;
                        currentLen++;
                        if (currentLen > bestLen) { bestLen = currentLen; bestStart = currentStart; }
                    } else {
                        currentStart = -1; currentLen = 0;
                    }
                }
                if (bestLen > 1) {
                    parts.splice(bestStart, bestLen, '');
                    if (bestStart === 0) parts.unshift('');
                    if (bestStart + bestLen === 8) parts.push('');
                }
                return parts.join(':') || '::';
            } else {
                return [
                    Number((longVal >> 24n) & 255n),
                    Number((longVal >> 16n) & 255n),
                    Number((longVal >> 8n) & 255n),
                    Number(longVal & 255n)
                ].join('.');
            }
        };

        const parseMask = (str, version) => {
            if (!str) return null;
            str = str.trim();
            if (str.startsWith('/')) str = str.substring(1);
            
            let maxBits = version === 6 ? 128 : 32;
            let bits = BigInt(maxBits);
            let cidr;

            if (!str.includes('.') && !str.includes(':')) {
                cidr = parseInt(str, 10);
                if (isNaN(cidr) || cidr < 0 || cidr > maxBits) return null;
            } else {
                const maskIp = parseIp(str);
                if (!maskIp || maskIp.version !== version) return null;
                
                let temp = maskIp.long;
                cidr = 0;
                let checkBit = 1n << (bits - 1n);
                while (temp & checkBit) {
                    cidr++;
                    temp = (temp << 1n) & ((1n << bits) - 1n);
                }
                if (temp !== 0n) return null; 
            }

            let longVal = 0n;
            if (cidr > 0) {
                longVal = ((1n << bits) - 1n) ^ ((1n << (bits - BigInt(cidr))) - 1n);
            }
            return { cidr, long: longVal };
        };

        const executeCopy = (text, message, showToast) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast(message || 'Copied to clipboard!');
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }
            document.body.removeChild(textArea);
        };

        const requestSort = (key, config, setConfig) => {
            let direction = 'asc';
            if (config.key === key && config.direction === 'asc') direction = 'desc';
            setConfig({ key, direction });
        };

        const sortData = (data, config) => {
            if (!data) return null;
            let sortableItems = [...data];
            sortableItems.sort((a, b) => {
                let aVal = a[config.key];
                let bVal = b[config.key];

                if (['network', 'firstUsable', 'lastUsable', 'broadcast', 'maskDecimal', 'firstUsed', 'lastUsed', 'firstIp', 'lastIp'].includes(config.key)) {
                    let parsedA = parseIp(aVal);
                    let parsedB = parseIp(bVal);
                    aVal = parsedA ? parsedA.long : 0n;
                    bVal = parsedB ? parsedB.long : 0n;
                } else if (config.key === 'maskCidr') {
                    aVal = parseInt(aVal.replace('/', ''), 10);
                    bVal = parseInt(bVal.replace('/', ''), 10);
                } else if (['usedCount', 'freeCount', 'size', 'neededIps', 'allocatedIps', 'value', 'usableIpsCount'].includes(config.key)) {
                    aVal = BigInt(aVal);
                    bVal = BigInt(bVal);
                }

                if (aVal < bVal) return config.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return config.direction === 'asc' ? 1 : -1;
                return 0;
            });
            return sortableItems;
        };

        // Algorithm to convert a range of IPs into perfectly aligned CIDR blocks
        const rangeToCidrs = (startLong, endLong, maxBits) => {
            let cidrs = [];
            let current = startLong;
            while (current <= endLong) {
                // Find max shift based on trailing zeros of current IP (Alignment)
                let maxShiftByAlignment = 0n;
                let temp = current;
                while (temp > 0n && (temp & 1n) === 0n && maxShiftByAlignment < BigInt(maxBits)) {
                    maxShiftByAlignment++;
                    temp >>= 1n;
                }
                if (current === 0n) maxShiftByAlignment = BigInt(maxBits);

                // Find max shift based on remaining space
                let remaining = endLong - current + 1n;
                let maxShiftBySpace = 0n;
                while ((1n << (maxShiftBySpace + 1n)) <= remaining && maxShiftBySpace < BigInt(maxBits)) {
                    maxShiftBySpace++;
                }

                let shift = maxShiftByAlignment < maxShiftBySpace ? maxShiftByAlignment : maxShiftBySpace;
                let cidr = Number(BigInt(maxBits) - shift);
                
                cidrs.push({ networkLong: current, cidr: cidr, size: 1n << shift });
                current += (1n << shift);
            }
            return cidrs;
        };

        // ==========================================

        const LinkedInIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
        );

        const getSortIcon = (key, config) => {
            if (config.key !== key) return <span className="ml-1 text-slate-300 dark:text-slate-600">↕</span>;
            return config.direction === 'asc' ? <span className="ml-1 text-blue-500">↑</span> : <span className="ml-1 text-blue-500">↓</span>;
        };

        const CopyableRow = ({ label, value, showToast, extraData }) => {
            return (
                <tr className="border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors group">

                            onClick={() => executeCopy(value, `${label} copied!`, showToast)}
                            className="text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded hover:bg-blue-50 dark:hover:bg-slate-700"
                            title="Copy to clipboard"
                        >
                            <CopyIcon />
                        </button>

                </tr>
            );
        };

        const HistoryPills = ({ history, onSelect, onClear }) => {
            if (history.length === 0) return null;
            return (
                <div className="flex items-center gap-2 mt-3 overflow-x-auto custom-scrollbar pb-2">
                    <HistoryIcon className="text-slate-400 shrink-0" />
                    {history.map((h, i) => (
                        <button 
                            key={i} 
                            onClick={() => onSelect(h)}
                            className="shrink-0 text-xs bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 px-2.5 py-1 rounded-full whitespace-nowrap transition-colors border border-slate-200 dark:border-slate-700 font-mono"
                        >

                    ))}
                    <button onClick={onClear} className="shrink-0 text-[10px] text-slate-400 hover:text-red-500 ml-2 uppercase tracking-wide font-bold transition-colors">Clear</button>
                </div>
            );
        };

        // ==========================================
        // SUB-COMPONENTS
        // ==========================================

        function Calculator({ showToast }) {
            const { history, addHistory, clearHistory } = useHistory('calc_history');
            const [ipInput, setIpInput] = useState('10.135.8.20');
            const [maskInput, setMaskInput] = useState('255.255.255.240');
            const [results, setResults] = useState(null);
            const [error, setError] = useState(null);
            const [generatedIps, setGeneratedIps] = useState('');
            const [ipListError, setIpListError] = useState(null);

            useEffect(() => { calculate(); }, []);

            const handleIpChange = (e) => {
                const val = e.target.value;
                if (val.includes('/')) {
                    const [ip, mask] = val.split('/');
                    setIpInput(ip.trim());
                    setMaskInput(mask.trim());
                } else {
                    setIpInput(val);
                }
            };

            const calculate = () => {
                setError(null);
                setGeneratedIps('');
                setIpListError(null);
                const ipData = parseIp(ipInput);
                if (ipData === null) { setError("Invalid IP Address format."); setResults(null); return; }

                const maskData = parseMask(maskInput, ipData.version);
                if (maskData === null) { setError("Invalid Subnet Mask format."); setResults(null); return; }

                // Add to history
                addHistory(`${ipInput}/${maskData.cidr}`);

                const version = ipData.version;
                const maxBits = version === 6 ? 128n : 32n;
                const fullMask = (1n << maxBits) - 1n;

                const { cidr, long: maskLong } = maskData;
                const ipLong = ipData.long;
                
                const networkLong = ipLong & maskLong;
                const wildcardLong = (~maskLong) & fullMask;
                const broadcastLong = networkLong | wildcardLong;

                let hostMinLong, hostMaxLong, hostsPerNet;

                if (version === 4) {
                    hostMinLong = networkLong + 1n;
                    hostMaxLong = broadcastLong - 1n;
                    hostsPerNet = (wildcardLong - 1n > 0n) ? (wildcardLong - 1n) : 0n;

                    if (cidr === 31) { hostMinLong = networkLong; hostMaxLong = broadcastLong; hostsPerNet = 2n; }
                    else if (cidr === 32) { hostMinLong = networkLong; hostMaxLong = broadcastLong; hostsPerNet = 1n; }
                } else {
                    hostMinLong = networkLong;
                    hostMaxLong = broadcastLong;
                    hostsPerNet = wildcardLong + 1n;
                }

                let ipClass = '';
                let ipType = 'Public Internet';

                if (version === 4) {
                    const firstOctet = Number((ipLong >> 24n) & 255n);
                    if (firstOctet >= 1 && firstOctet <= 127) ipClass = 'Class A';
                    else if (firstOctet >= 128 && firstOctet <= 191) ipClass = 'Class B';
                    else if (firstOctet >= 192 && firstOctet <= 223) ipClass = 'Class C';
                    else if (firstOctet >= 224 && firstOctet <= 239) ipClass = 'Class D (Multicast)';
                    else if (firstOctet >= 240 && firstOctet <= 255) ipClass = 'Class E (Reserved)';

                    if (firstOctet === 10) ipType = 'Private (RFC 1918)';
                    else if (firstOctet === 172 && Number((ipLong >> 16n) & 255n) >= 16 && Number((ipLong >> 16n) & 255n) <= 31) ipType = 'Private (RFC 1918)';
                    else if (firstOctet === 192 && Number((ipLong >> 16n) & 255n) === 168) ipType = 'Private (RFC 1918)';
                    else if (firstOctet === 127) ipType = 'Loopback';
                    else if (firstOctet === 169 && Number((ipLong >> 16n) & 255n) === 254) ipType = 'Link-Local (APIPA)';
                    else if (firstOctet === 100 && Number((ipLong >> 16n) & 255n) >= 64 && Number((ipLong >> 16n) & 255n) <= 127) ipType = 'Carrier-Grade NAT';
                } else {
                    const firstBlock = Number((ipLong >> 112n) & 0xffffn);
                    ipClass = 'IPv6 Address';
                    if (ipLong === 1n) ipType = 'Loopback (::1)';
                    else if (ipLong === 0n) ipType = 'Unspecified (::)';
                    else if ((firstBlock & 0xff00) === 0xff00) ipType = 'Multicast (ff00::/8)';
                    else if ((firstBlock & 0xfe80) === 0xfe80) ipType = 'Link-Local (fe80::/10)';
                    else if ((firstBlock & 0xfc00) === 0xfc00) ipType = 'Unique Local (fc00::/7)';
                    else if (firstBlock === 0x2001 && Number((ipLong >> 96n) & 0xffffn) === 0xdb8) ipType = 'Documentation (2001:db8::/32)';
                    else ipType = 'Global Unicast';
                }

                setResults({
                    version, ipLong, maskLong, wildcardLong, networkLong, broadcastLong, 
                    hostMinLong, hostMaxLong, hostsPerNet: hostsPerNet.toString(), cidr, ipClass, ipType
                });
            };

            const generateAllIps = () => {
                if (!results) return;
                setIpListError(null);
                
                const hostsBig = BigInt(results.hostsPerNet);
                if (hostsBig === 0n) {
                    setIpListError("No usable IPs in this subnet.");
                    setGeneratedIps('');
                    return;
                }
                if (hostsBig > 65536n) {
                    setIpListError(`Too many IPs to list (${results.hostsPerNet}). Limit is 65,536 to prevent browser freezing.`);
                    setGeneratedIps('');
                    return;
                }
                
                let ips = [];
                for (let i = results.hostMinLong; i <= results.hostMaxLong; i++) {
                    ips.push(formatIp(i, results.version));
                }
                setGeneratedIps(ips.join('\n'));
                showToast(`Generated ${results.hostsPerNet} IPs`);
            };

            const copyToExcel = () => {
                if (!results) return;
                const v = results.version;
                let text = `Address:\t${formatIp(results.ipLong, v)}\n`;
                text += `Netmask:\t${formatIp(results.maskLong, v)}\n`;
                text += `Wildcard:\t${formatIp(results.wildcardLong, v)}\n`;
                text += `Network:\t${formatIp(results.networkLong, v)}/${results.cidr}\t${results.ipClass ? '('+results.ipClass+')' : ''}\n`;
                text += `Broadcast:\t${formatIp(results.broadcastLong, v)}\n`;
                text += `1st Usable IP:\t${formatIp(results.hostMinLong, v)}\n`;
                text += `Last Usable IP:\t${formatIp(results.hostMaxLong, v)}\n`;
                text += `No. of Useable IPs:\t${results.hostsPerNet}`;
                executeCopy(text, 'Calculator results copied to Excel format!', showToast);
            };

            return (
                <div className="animate-in fade-in duration-300">
                    <div className="bg-blue-50/50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 rounded-xl p-4 mb-8 flex gap-3 text-sm text-blue-900 dark:text-blue-100 shadow-sm">
                        <InfoIcon />
                        <div>
                            <strong className="block font-semibold mb-1">How to use the Calculator</strong>
                            <p className="opacity-90 mb-1">Analyze network boundaries, broadcast addresses, and usable host ranges.</p>
                            <ul className="list-disc pl-4 space-y-1 opacity-90">
                                <li><strong>Magic Paste:</strong> Paste an IP with a CIDR suffix (e.g., <code>192.168.1.1/24</code>) and the mask will auto-fill.</li>
                                <li>Supports both <strong>IPv4</strong> and massive 128-bit <strong>IPv6</strong> addresses natively.</li>
                            </ul>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 mb-8">
                        <div className="flex flex-wrap gap-6 items-end">
                            <div className="flex-1 min-w-[200px]">
                                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">
                                    Address <span className="font-normal text-slate-400 dark:text-slate-500 ml-1">(Auto-detects /CIDR)</span>
                                </label>
                                <input 
                                    type="text" 
                                    value={ipInput} 
                                    onChange={handleIpChange} 
                                    onKeyDown={(e) => e.key === 'Enter' && calculate()} 
                                    className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow font-mono" 
                                    placeholder="e.g. 192.168.1.1/24" 
                                />
                            </div>
                            <div className="hidden sm:block text-2xl font-light text-slate-300 dark:text-slate-600 mb-2">/</div>
                            <div className="flex-1 min-w-[200px]">
                                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">
                                    Netmask <span className="font-normal text-slate-400 dark:text-slate-500 ml-1">(CIDR or Decimal)</span>
                                </label>
                                <input 
                                    type="text" 
                                    value={maskInput} 
                                    onChange={(e) => setMaskInput(e.target.value)} 
                                    onKeyDown={(e) => e.key === 'Enter' && calculate()} 
                                    className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow font-mono" 
                                />
                            </div>
                            <button 
                                onClick={calculate} 
                                className="bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-semibold shadow-sm transition-colors focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800"
                            >
                                Calculate
                            </button>
                        </div>
                        {error && <div className="text-red-500 dark:text-red-400 text-sm mt-3 flex items-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>{error}</div>}
                        <HistoryPills history={history} onClear={clearHistory} onSelect={(val) => {
                            if (val.includes('/')) {
                                const [ip, mask] = val.split('/');
                                setIpInput(ip); setMaskInput(mask);
                            } else { setIpInput(val); }
                        }} />
                    </div>

                    {results && (
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                            <div className="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex justify-between items-center">
                                <h3 className="font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                    Results
                                    <span className="text-xs font-medium px-2 py-0.5 bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300 rounded-full border border-blue-200 dark:border-blue-800">IPv{results.version}</span>
                                </h3>
                                <button 
                                    onClick={copyToExcel} 
                                    className="text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 px-3 py-1.5 rounded-md flex items-center gap-1.5 transition-colors shadow-sm"
                                >
                                    <ExcelIcon /> Copy for Excel
                                </button>
                            </div>
                            <div className="px-6 py-2">
                                <table className="w-full text-left whitespace-nowrap text-sm">
                                    <tbody>
                                        <CopyableRow label="Address:" value={formatIp(results.ipLong, results.version)} showToast={showToast} />
                                        <CopyableRow label="Netmask:" value={formatIp(results.maskLong, results.version)} showToast={showToast} />
                                        <CopyableRow label="Wildcard:" value={formatIp(results.wildcardLong, results.version)} showToast={showToast} />
                                        
                                        <tr className="border-b border-slate-100 dark:border-slate-700/50 bg-blue-50/30 dark:bg-blue-900/10 group hover:bg-blue-50/60 dark:hover:bg-blue-900/20 transition-colors">
                                            <td className="pr-4 py-3 font-bold text-slate-800 dark:text-slate-200">Network:</td>
                                            <td className="py-3 text-blue-700 dark:text-blue-400 font-mono font-bold text-base flex items-center gap-3">
                                                <span>{formatIp(results.networkLong, results.version)}/{results.cidr}</span>
                                                {results.ipClass && <span className="text-emerald-600 dark:text-emerald-400 font-sans font-normal text-sm bg-emerald-50 dark:bg-emerald-900/20 px-2 py-0.5 rounded-full border border-emerald-100 dark:border-emerald-800/50">{results.ipClass}</span>}
                                                <button onClick={() => executeCopy(`${formatIp(results.networkLong, results.version)}/${results.cidr}`, 'Network address copied!', showToast)} className="text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded hover:bg-blue-100 dark:hover:bg-blue-900/40"><CopyIcon /></button>
                                            </td>
                                        </tr>
                                        
                                        <CopyableRow label="Broadcast:" value={formatIp(results.broadcastLong, results.version)} showToast={showToast} />
                                        <CopyableRow label="1st Usable IP:" value={formatIp(results.hostMinLong, results.version)} showToast={showToast} />
                                        <CopyableRow label="Last Usable IP:" value={formatIp(results.hostMaxLong, results.version)} showToast={showToast} />
                                        <CopyableRow label="No. of Useable IPs:" value={results.hostsPerNet} extraData={`(${results.ipType})`} showToast={showToast} />
                                    </tbody>
                                </table>
                            </div>
                            
                            <div className="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-200 dark:border-slate-700">
                                <div className="flex items-center gap-4 mb-3">
                                    <button 
                                        onClick={generateAllIps} 
                                        className="text-sm font-medium text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 px-4 py-2 rounded-md transition-colors shadow-sm"
                                    >
                                        Generate Complete Range of Usable IPs
                                    </button>
                                    {ipListError && <span className="text-red-500 dark:text-red-400 text-sm flex items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>{ipListError}</span>}
                                </div>
                                {generatedIps && (
                                    <div className="relative">
                                        <textarea 
                                            readOnly 
                                            value={generatedIps} 
                                            className="w-full h-48 p-3 border border-slate-300 dark:border-slate-600 rounded-md font-mono text-sm focus:outline-none bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 shadow-inner custom-scrollbar"
                                        />
                                        <button 
                                            onClick={() => executeCopy(generatedIps, 'Complete range copied!', showToast)}
                                            className="absolute top-3 right-3 p-2 bg-slate-100 dark:bg-slate-800 hover:bg-blue-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 rounded-md transition-colors shadow-sm"
                                            title="Copy full range"
                                        >
                                            <CopyIcon />
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- BINARY TREEMAP COMPONENT ---
        const SubnetTree = ({ node, version, depth = 0 }) => {
            if (!node) return null;

            if (node.type === 'split') {
                // Alternate splitting direction for a beautiful Treemap effect
                const isRow = depth % 2 === 0;
                return (
                    <div className={`flex w-full h-full ${isRow ? 'flex-row' : 'flex-col'}`}>
                        <div className={`flex-1 min-w-0 min-h-0 ${isRow ? 'border-r border-slate-900/10 dark:border-white/10' : 'border-b border-slate-900/10 dark:border-white/10'}`}>
                            <SubnetTree node={node.left} version={version} depth={depth + 1} />
                        </div>
                        <div className="flex-1 min-w-0 min-h-0">
                            <SubnetTree node={node.right} version={version} depth={depth + 1} />
                        </div>
                    </div>
                );
            }

            if (node.type === 'allocated') {
                return (
                    <div className={`${node.allocData.colorClass} w-full h-full flex items-center justify-center text-white font-bold overflow-hidden group relative cursor-help hover:opacity-90 transition-opacity`} title={`${node.allocData.name}\n${formatIp(node.networkLong, version)}/${node.cidr}`}>
                        <span className="text-[10px] md:text-xs truncate px-1">{node.allocData.name}</span>
                        <div className="hidden group-hover:flex absolute inset-0 bg-black/80 flex-col items-center justify-center p-2 z-10 text-center backdrop-blur-sm transition-all duration-200">
                            <span className="truncate w-full text-[10px] md:text-xs mb-0.5">{node.allocData.name}</span>
                            <span className="font-mono text-[8px] md:text-[10px] opacity-90">{formatIp(node.networkLong, version)}/{node.cidr}</span>
                        </div>
                    </div>
                );
            }

            // Free Node
            return (
                <div className="striped-bg w-full h-full flex items-center justify-center text-slate-400 dark:text-slate-500 cursor-help group hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors" title={`Free Space\n${formatIp(node.networkLong, version)}/${node.cidr}`}>
                    <span className="opacity-0 group-hover:opacity-100 font-mono text-[8px] md:text-[10px] bg-white/90 dark:bg-slate-800/90 px-1 rounded transition-opacity truncate max-w-full">/{node.cidr}</span>
                </div>
            );
        };

        function VlsmPlanner({ showToast }) {
            const { history, addHistory, clearHistory } = useHistory('vlsm_history');
            const [majorNetwork, setMajorNetwork] = useState('192.168.1.0/24');
            const [usedPrefixesInput, setUsedPrefixesInput] = useState('');
            const [visualMode, setVisualMode] = useState('treemap'); // Add visualization toggle
            const [subnets, setSubnets] = useState([
                { id: 1, name: 'VLAN 10 - HR', type: 'hosts', value: 60, quantity: 1 },
                { id: 2, name: 'VLAN 20 - IT', type: 'hosts', value: 25, quantity: 1 },
                { id: 3, name: 'PtP Links', type: 'cidr', value: 30, quantity: 3 }
            ]);
            const [results, setResults] = useState(null);
            const [error, setError] = useState(null);
            const [sortConfig, setSortConfig] = useState({ key: 'allocatedIps', direction: 'desc' });

            const colors = ['bg-blue-500', 'bg-emerald-500', 'bg-purple-500', 'bg-amber-500', 'bg-pink-500', 'bg-cyan-500', 'bg-rose-500', 'bg-indigo-500', 'bg-teal-500'];

            const addSubnet = () => {
                const newId = subnets.length > 0 ? Math.max(...subnets.map(s => s.id)) + 1 : 1;
                setSubnets([...subnets, { id: newId, name: `New Subnet ${newId}`, type: 'hosts', value: 10, quantity: 1 }]);
            };

            const updateSubnet = (id, field, value) => {
                setSubnets(subnets.map(s => s.id === id ? { ...s, [field]: value } : s));
            };

            const removeSubnet = (id) => {
                setSubnets(subnets.filter(s => s.id !== id));
            };

            // TRUE BINARY TREE INSERTION LOGIC
            const insertAllocation = (node, alloc, maxBitsNumber) => {
                if (node.type === 'allocated') return false; // Full
                
                // Exact match found!
                if (node.cidr === alloc.cidr) {
                    if (node.type === 'free') {
                        node.type = 'allocated';
                        node.allocData = alloc;
                        alloc.networkLong = node.networkLong; // Lock in the assigned IP
                        return true;
                    }
                    return false;
                }
                
                // Target CIDR is smaller (meaning larger network block), so this node is too small.
                if (node.cidr > alloc.cidr) return false; 
                
                // Need to split this free node into two halves
                if (node.type === 'free') {
                    node.type = 'split';
                    const step = 1n << BigInt(maxBitsNumber - (node.cidr + 1));
                    node.left = { networkLong: node.networkLong, cidr: node.cidr + 1, type: 'free' };
                    node.right = { networkLong: node.networkLong + step, cidr: node.cidr + 1, type: 'free' };
                }
                
                // Recursively try left, then right
                if (insertAllocation(node.left, alloc, maxBitsNumber)) return true;
                return insertAllocation(node.right, alloc, maxBitsNumber);
            };

            const flattenTree = (node, blocks = []) => {
                if (!node) return blocks;
                if (node.type === 'split') {
                    flattenTree(node.left, blocks);
                    flattenTree(node.right, blocks);
                } else if (node.type === 'allocated') {
                    blocks.push({ type: 'allocated', ...node.allocData, cidr: node.cidr, networkLong: node.networkLong });
                } else if (node.type === 'free') {
                    blocks.push({ type: 'free', cidr: node.cidr, networkLong: node.networkLong });
                }
                return blocks;
            };

            const calculateVlsm = () => {
                setError(null);
                
                const [ipStr, maskStr] = majorNetwork.split('/');
                if (!ipStr || !maskStr) {
                    setResults(null);
                    return setError("Major network must be in CIDR format (e.g., 192.168.1.0/24 or 2001:db8::/48)");
                }

                const ipData = parseIp(ipStr);
                if (!ipData) {
                    setResults(null);
                    return setError("Invalid IP format.");
                }
                
                const version = ipData.version;
                const maskData = parseMask(maskStr, version);
                if (!maskData) {
                    setResults(null);
                    return setError("Invalid CIDR mask.");
                }

                // Add to history on successful format
                addHistory(majorNetwork);

                const maxBitsNumber = version === 4 ? 32 : 128;
                const maxBits = BigInt(maxBitsNumber);
                const majorNetworkLong = ipData.long & maskData.long;
                const majorBroadcastLong = majorNetworkLong | ((1n << (maxBits - BigInt(maskData.cidr))) - 1n);
                const totalMajorIps = majorBroadcastLong - majorNetworkLong + 1n;

                let rootNode = { networkLong: majorNetworkLong, cidr: maskData.cidr, type: 'free' };
                let usedIps = 0n;

                // --- Handle Used Prefixes ---
                const rawLines = usedPrefixesInput.split(/[\r\n]+/).map(t => t.trim()).filter(t => t);
                let usedRanges = [];
                let originalUsedRanges = [];
                for (const line of rawLines) {
                    let tokens = [line];
                    // Fallback to comma separation ONLY if no description format is detected
                    if (line.includes(',') && !line.match(/^([a-fA-F0-9.:/]+(?:\s*-\s*[a-fA-F0-9.:]+)?)\s+(.+)$/)) {
                        tokens = line.split(',').map(t => t.trim()).filter(t => t);
                    }

                    for (const tokenStr of tokens) {
                        const match = tokenStr.match(/^([a-fA-F0-9.:/]+(?:\s*-\s*[a-fA-F0-9.:]+)?)(?:\s+(.*))?$/);
                        if (match) {
                            let token = match[1];
                            let desc = match[2] ? match[2].trim() : 'Used (Pre-allocated)';
                            
                            let sLong = null;
                            let eLong = null;

                            if (token.includes('/')) {
                                const [ipStr, maskStr] = token.split('/');
                                const ipD = parseIp(ipStr);
                                const md = parseMask(maskStr, version);
                                if (ipD && md && ipD.version === version) {
                                    sLong = ipD.long & md.long;
                                    eLong = sLong | ((1n << BigInt(maxBitsNumber - md.cidr)) - 1n);
                                }
                            } else if (token.includes('-')) {
                                const [startStr, endStr] = token.split('-');
                                const startD = parseIp(startStr);
                                const endD = parseIp(endStr);
                                if (startD && endD && startD.version === version) {
                                    sLong = startD.long;
                                    eLong = endD.long;
                                }
                            } else {
                                const ipD = parseIp(token);
                                if (ipD && ipD.version === version) {
                                    sLong = ipD.long;
                                    eLong = ipD.long;
                                }
                            }

                            if (sLong !== null && eLong !== null) {
                                usedRanges.push([sLong, eLong]);
                                originalUsedRanges.push({start: sLong, end: eLong, desc});
                            }
                        }
                    }
                }

                let clampedRanges = [];
                for (const [start, end] of usedRanges) {
                    let cStart = start < majorNetworkLong ? majorNetworkLong : start;
                    let cEnd = end > majorBroadcastLong ? majorBroadcastLong : end;
                    if (cStart <= cEnd) clampedRanges.push([cStart, cEnd]);
                }
                clampedRanges.sort((a, b) => a[0] < b[0] ? -1 : (a[0] > b[0] ? 1 : 0));
                
                let mergedRanges = [];
                if (clampedRanges.length > 0) {
                    let current = clampedRanges[0];
                    for (let i = 1; i < clampedRanges.length; i++) {
                        if (clampedRanges[i][0] <= current[1] + 1n) {
                            current[1] = current[1] > clampedRanges[i][1] ? current[1] : clampedRanges[i][1];
                        } else {
                            mergedRanges.push(current);
                            current = clampedRanges[i];
                        }
                    }
                    mergedRanges.push(current);
                }

                const forceAllocate = (node, targetLong, targetCidr, desc) => {
                    if (node.type === 'allocated') return false; 
                    if (node.cidr === targetCidr) {
                        if (node.networkLong === targetLong) {
                            if (node.type === 'free') {
                                node.type = 'allocated';
                                node.allocData = { name: desc, colorClass: 'bg-slate-500' };
                                return true;
                            }
                            return false;
                        }
                        return false;
                    }
                    if (node.cidr > targetCidr) return false;

                    if (node.type === 'free') {
                        node.type = 'split';
                        const step = 1n << BigInt(maxBitsNumber - (node.cidr + 1));
                        node.left = { networkLong: node.networkLong, cidr: node.cidr + 1, type: 'free' };
                        node.right = { networkLong: node.networkLong + step, cidr: node.cidr + 1, type: 'free' };
                    }

                    if (node.type === 'split') {
                        const step = 1n << BigInt(maxBitsNumber - (node.cidr + 1));
                        if (targetLong < node.networkLong + step) {
                            return forceAllocate(node.left, targetLong, targetCidr, desc);
                        } else {
                            return forceAllocate(node.right, targetLong, targetCidr, desc);
                        }
                    }
                    return false;
                };

                for (const [s, e] of mergedRanges) {
                    const cidrsInRange = rangeToCidrs(s, e, maxBitsNumber);
                    for (const b of cidrsInRange) {
                        const originalMatch = originalUsedRanges.find(r => b.networkLong >= r.start && b.networkLong <= r.end);
                        const desc = originalMatch ? originalMatch.desc : 'Used (Pre-allocated)';
                        if (forceAllocate(rootNode, b.networkLong, b.cidr, desc)) {
                            usedIps += b.size;
                        }
                    }
                }

                let processedReqs = [];
                for (const req of subnets) {
                    let qty = parseInt(req.quantity, 10);
                    if (isNaN(qty) || qty < 1) qty = 1;
                    
                    let val = parseInt(req.value, 10);
                    if (isNaN(val) || val < 0) continue; 
                    if (req.name.trim() === '') continue;

                    for (let j = 0; j < qty; j++) {
                        let name = qty > 1 ? `${req.name} #${j + 1}` : req.name;
                        let allocatedBits, neededIps;

                        if (req.type === 'cidr') {
                            if (val > maxBitsNumber || val < 0) {
                                setResults(null);
                                return setError(`Invalid CIDR /${val} for ${name}`);
                            }
                            allocatedBits = BigInt(maxBitsNumber - val);
                            neededIps = 1n << allocatedBits;
                        } else {
                            if (val === 0) continue;
                            // IPv4 needs +2 (Net/Broadcast). IPv6 doesn't.
                            neededIps = version === 4 ? BigInt(val) + 2n : BigInt(val);
                            allocatedBits = 0n;
                            while ((1n << allocatedBits) < neededIps) {
                                allocatedBits++;
                            }
                            if (allocatedBits > maxBits) allocatedBits = maxBits;
                        }

                        let allocatedIps = 1n << allocatedBits;
                        let cidr = Number(maxBits - allocatedBits);

                        processedReqs.push({
                            originalId: req.id,
                            name,
                            sizeLabel: req.type === 'cidr' ? `/${val}` : `${val} Req. IPs`,
                            neededIps,
                            allocatedIps,
                            cidr
                        });
                    }
                }

                if (processedReqs.length === 0) {
                    setResults(null);
                    return setError("Please add at least one valid subnet requirement.");
                }

                // CRITICAL: VLSM requires sorting from largest allocated block to smallest
                processedReqs.sort((a, b) => {
                    if (a.allocatedIps > b.allocatedIps) return -1;
                    if (a.allocatedIps < b.allocatedIps) return 1;
                    return 0;
                });

                let finalResults = [];

                for (let i = 0; i < processedReqs.length; i++) {
                    let req = processedReqs[i];
                    req.colorClass = colors[req.originalId % colors.length];
                    
                    // Insert into mathematical tree map
                    let success = insertAllocation(rootNode, req, maxBitsNumber);
                    
                    if (!success) {
                        setResults(null); // Clear stale UI maps!
                        return setError(`Not enough contiguous space in the major network to allocate "${req.name}" (requires /${req.cidr}). Total block may be exhausted.`);
                    }

                    // Once successfully inserted, req.networkLong is populated
                    let bcastLong = req.networkLong + req.allocatedIps - 1n;
                    
                    let firstLong, lastLong;
                    if (version === 4) {
                        firstLong = req.cidr >= 31 ? req.networkLong : req.networkLong + 1n;
                        lastLong = req.cidr === 32 ? req.networkLong : (req.cidr === 31 ? bcastLong : bcastLong - 1n);
                    } else {
                        // IPv6
                        firstLong = req.networkLong;
                        lastLong = bcastLong;
                    }

                    // Properly format IPv4/IPv6 mask
                    const maskBitsInt = (1n << BigInt(maxBitsNumber)) - 1n;
                    const shiftInt = 1n << BigInt(maxBitsNumber - req.cidr);
                    const calculatedMaskLong = maskBitsInt ^ (shiftInt - 1n);

                    finalResults.push({
                        ...req,
                        no: i + 1,
                        network: formatIp(req.networkLong, version),
                        broadcast: formatIp(bcastLong, version),
                        firstUsable: formatIp(firstLong, version),
                        lastUsable: formatIp(lastLong, version),
                        maskCidr: `/${req.cidr}`,
                        maskDecimal: formatIp(calculatedMaskLong, version)
                    });

                    usedIps += req.allocatedIps;
                }

                let freeSpace = totalMajorIps - usedIps;
                let usagePercent = Number((usedIps * 10000n) / totalMajorIps) / 100;

                setResults({
                    version,
                    allocations: finalResults,
                    freeSpace: freeSpace,
                    totalSpace: totalMajorIps,
                    usagePercent: usagePercent,
                    majorNetworkFormatted: formatIp(majorNetworkLong, version) + '/' + maskData.cidr,
                    treeRoot: rootNode // Pass full binary tree
                });
                showToast(`VLSM plan built successfully`);
            };

            const displayedResults = useMemo(() => {
                return sortData(results?.allocations, sortConfig);
            }, [results, sortConfig]);

            const copyToExcel = () => {
                if (!displayedResults) return;
                let text = "Name\tRequested Size\tAllocated IPs\tSubnet\tSubnet Mask\tMask (CIDR)\tUsable Range\tBroadcast\n";
                text += displayedResults.map(r => `${r.name}\t${r.sizeLabel}\t${r.allocatedIps}\t${r.network}\t${r.maskDecimal}\t${r.maskCidr}\t${r.firstUsable} - ${r.lastUsable}\t${r.broadcast}`).join('\n');
                executeCopy(text, 'VLSM plan copied to Excel format!', showToast);
            };

            return (
                <div className="animate-in fade-in duration-300">
                    <div className="bg-blue-50/50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 rounded-xl p-4 mb-8 flex gap-3 text-sm text-blue-900 dark:text-blue-100 shadow-sm">
                        <InfoIcon />
                        <div>
                            <strong className="block font-semibold mb-1">VLSM Planner & Visualizer</strong>
                            <ul className="list-disc pl-4 space-y-1 opacity-90">
                                <li><strong>Full IPv4 & IPv6 Support:</strong> Slice both standard and 128-bit subnets accurately on bit boundaries without overlaps.</li>
                                <li><strong>Dual Visualizations:</strong> Toggle between the mathematically accurate Binary Treemap (to see bit splits) and the standard Linear Bar (to see exact proportions).</li>
                            </ul>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
                        {/* Input Section */}
                        <div className="lg:col-span-5 bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col">
                            <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-4 pb-2 border-b border-slate-100 dark:border-slate-700/50">1. Major Network</h3>
                            <div className="mb-2">
                                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">Parent Block (CIDR)</label>
                                <input 
                                    type="text" 
                                    value={majorNetwork} 
                                    onChange={(e) => setMajorNetwork(e.target.value)} 
                                    onKeyDown={(e) => e.key === 'Enter' && calculateVlsm()}
                                    className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono" 
                                    placeholder="e.g. 192.168.1.0/24 or 2001:db8::/48" 
                                />
                            </div>
                            <HistoryPills history={history} onClear={clearHistory} onSelect={setMajorNetwork} />

                            <div className="mt-4 mb-2">
                                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">
                                    Already Used Prefixes/Ranges <span className="font-normal text-slate-400 dark:text-slate-500">(Optional)</span>
                                </label>
                                <textarea 
                                    value={usedPrefixesInput} 
                                    onChange={(e) => setUsedPrefixesInput(e.target.value)} 
                                    onKeyDown={(e) => (e.ctrlKey || e.metaKey) && e.key === 'Enter' && calculateVlsm()}
                                    className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono shadow-inner custom-scrollbar min-h-[80px]" 
                                    placeholder="e.g.&#10;192.168.1.0/26 Core Routers&#10;192.168.1.100 - 192.168.1.120 DHCP Pool" 
                                />
                                <div className="text-xs text-slate-400 mt-1">Use Ctrl+Enter to calculate</div>
                            </div>

                            <div className="flex justify-between items-center mb-2 mt-4 pb-2 border-b border-slate-100 dark:border-slate-700/50">
                                <h3 className="font-bold text-slate-800 dark:text-slate-100">2. Subnets Needed</h3>
                                <button onClick={addSubnet} className="text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 hover:bg-blue-50 dark:hover:bg-slate-700 p-1.5 rounded transition-colors" title="Add Requirement">
                                    <PlusIcon />
                                </button>
                            </div>
                            
                            {/* Column Headers for Input Array */}
                            <div className="flex text-xs font-semibold text-slate-500 dark:text-slate-400 mb-2 px-1 gap-2">
                                <div className="flex-1">Description</div>
                                <div className="w-24">Type</div>
                                <div className="w-20">Size</div>
                                <div className="w-14">Qty</div>
                                <div className="w-6"></div>
                            </div>

                            <div className="space-y-2 flex-1 overflow-y-auto pr-1 custom-scrollbar min-h-[200px] max-h-[300px]">
                                {subnets.map((subnet) => (
                                    <div key={subnet.id} className="flex items-center gap-2 group">
                                        <div className="flex-1">
                                            <input 
                                                type="text" 
                                                value={subnet.name} 
                                                onChange={(e) => updateSubnet(subnet.id, 'name', e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && calculateVlsm()}
                                                className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded text-sm px-2 py-1.5 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-blue-500 dark:focus:border-blue-500"
                                                placeholder="Name"
                                            />
                                        </div>
                                        <div className="w-24">
                                            <select
                                                value={subnet.type}
                                                onChange={(e) => updateSubnet(subnet.id, 'type', e.target.value)}
                                                className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded text-sm px-2 py-1.5 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-blue-500 dark:focus:border-blue-500 appearance-none cursor-pointer"
                                            >
                                                <option value="hosts">Req. IPs</option>
                                                <option value="cidr">CIDR (/x)</option>
                                            </select>
                                        </div>
                                        <div className="w-20">
                                            <input 
                                                type="number" 
                                                min="0"
                                                value={subnet.value} 
                                                onChange={(e) => updateSubnet(subnet.id, 'value', e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && calculateVlsm()}
                                                className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded text-sm px-2 py-1.5 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-blue-500 dark:focus:border-blue-500"
                                                placeholder={subnet.type === 'hosts' ? 'IPs' : 'e.g. 24'}
                                            />
                                        </div>
                                        <div className="w-14 relative flex items-center">
                                            <span className="absolute left-1.5 text-slate-400 text-xs">x</span>
                                            <input 
                                                type="number" 
                                                min="1"
                                                value={subnet.quantity} 
                                                onChange={(e) => updateSubnet(subnet.id, 'quantity', e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && calculateVlsm()}
                                                className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded text-sm pl-4 pr-1 py-1.5 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-blue-500 dark:focus:border-blue-500"
                                            />
                                        </div>
                                        <button onClick={() => removeSubnet(subnet.id)} className="w-6 text-slate-300 dark:text-slate-600 hover:text-red-500 dark:hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100 p-1 flex justify-center">
                                            <TrashIcon />
                                        </button>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-4 pt-4 border-t border-slate-100 dark:border-slate-700/50">
                                <button onClick={calculateVlsm} className="w-full bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold shadow-sm transition-colors focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">Build VLSM Plan</button>
                                {error && <div className="text-red-500 dark:text-red-400 text-sm mt-3 flex items-start gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg><span>{error}</span></div>}
                            </div>
                        </div>

                        {/* Visual & Table Results Section */}
                        <div className="lg:col-span-7">
                            {results && (
                                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden animate-fade-in flex flex-col h-full">
                                    <div className="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                        <div>
                                            <h3 className="font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">VLSM Allocation Map</h3>
                                            <div className="text-sm text-slate-500 dark:text-slate-400 mt-0.5">Parent: {results.majorNetworkFormatted} <span className="mx-1">•</span> Utilized: {results.usagePercent}% <span className="mx-1">•</span> <span className="bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300 px-1.5 py-0.5 rounded text-[10px] uppercase font-bold tracking-wider border border-blue-200 dark:border-blue-800">IPv{results.version}</span></div>
                                        </div>
                                        
                                        <div className="flex items-center gap-3 w-full sm:w-auto">
                                            {/* Visual Toggle */}
                                            <div className="flex bg-slate-200/50 dark:bg-slate-700/50 p-1 rounded-lg gap-1">
                                                <button 
                                                    onClick={() => setVisualMode('treemap')} 
                                                    className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${visualMode === 'treemap' ? 'bg-white dark:bg-slate-800 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}
                                                >
                                                    Treemap
                                                </button>
                                                <button 
                                                    onClick={() => setVisualMode('linear')} 
                                                    className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${visualMode === 'linear' ? 'bg-white dark:bg-slate-800 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}
                                                >
                                                    Linear
                                                </button>
                                            </div>

                                            <button onClick={copyToExcel} className="text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors shadow-sm whitespace-nowrap">
                                                <ExcelIcon /> Copy
                                            </button>
                                        </div>
                                    </div>

                                    {/* Map Display */}
                                    <div className="p-6 border-b border-slate-100 dark:border-slate-700/50">
                                        {visualMode === 'treemap' ? (
                                            <div className="w-full h-48 md:h-64 rounded-lg overflow-hidden shadow-inner bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 relative">
                                                <SubnetTree node={results.treeRoot} version={results.version} />
                                            </div>
                                        ) : (
                                            <div className="w-full h-12 flex rounded-lg overflow-hidden shadow-inner bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 relative group">
                                                {flattenTree(results.treeRoot).map((block, idx) => {
                                                    const size = 1n << BigInt((results.version === 6 ? 128 : 32) - block.cidr);
                                                    const pct = Number((size * 10000n) / results.totalSpace) / 100;
                                                    
                                                    if (block.type === 'allocated') {
                                                        return (
                                                            <div 
                                                                key={idx}
                                                                className={`${block.colorClass} h-full flex items-center justify-center text-white text-xs font-bold overflow-hidden transition-all hover:opacity-90 cursor-help border-r border-white/20`}
                                                                style={{ width: `${pct}%` }}
                                                                title={`${block.name}\n${formatIp(block.networkLong, results.version)}/${block.cidr}`}
                                                            >
                                                                {pct > 5 && block.name}
                                                            </div>
                                                        );
                                                    } else {
                                                        return (
                                                            <div 
                                                                key={idx}
                                                                className="h-full flex items-center justify-center text-slate-400 dark:text-slate-500 text-xs font-bold overflow-hidden cursor-help striped-bg"
                                                                style={{ width: `${pct}%` }}
                                                                title={`Free Space\n${formatIp(block.networkLong, results.version)}/${block.cidr}`}
                                                            >
                                                                {pct > 5 && 'Free'}
                                                            </div>
                                                        );
                                                    }
                                                })}
                                            </div>
                                        )}
                                        <div className="flex justify-between text-xs text-slate-400 dark:text-slate-500 mt-2 px-1 font-mono">
                                            <span>{formatIp(results.treeRoot.networkLong, results.version)}</span>
                                            <span>{results.freeSpace > 0n ? `${results.freeSpace} IPs free` : 'Fully Allocated'}</span>
                                        </div>
                                    </div>

                                    {/* Tabular Data */}
                                    <div className="overflow-x-auto flex-1">
                                        <table className="w-full text-left text-sm whitespace-nowrap">
                                            <thead className="bg-slate-50 dark:bg-slate-800/50 sticky top-0 border-b border-slate-200 dark:border-slate-700">
                                                <tr>
                                                    <th className="p-3 font-semibold text-slate-600 dark:text-slate-300">Color</th>
                                                    <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('name', sortConfig, setSortConfig)}>Subnet Name {getSortIcon('name', sortConfig)}</th>
                                                    <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('sizeLabel', sortConfig, setSortConfig)}>Req. Size {getSortIcon('sizeLabel', sortConfig)}</th>
                                                    <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('allocatedIps', sortConfig, setSortConfig)}>Allocated IPs {getSortIcon('allocatedIps', sortConfig)}</th>
                                                    <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('network', sortConfig, setSortConfig)}>Network Address {getSortIcon('network', sortConfig)}</th>
                                                    <th className="p-3 font-semibold text-slate-600 dark:text-slate-300">Usable Range</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50">
                                                {displayedResults.map((row, idx) => {
                                                    return (
                                                        <tr key={idx} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                                                            <td className="p-3">
                                                                <div className={`w-4 h-4 rounded-full ${colors[row.originalId % colors.length]} shadow-sm`}></div>
                                                            </td>
                                                            <td className="p-3 font-medium text-slate-700 dark:text-slate-200">{row.name}</td>
                                                            <td className="p-3 text-slate-500 dark:text-slate-400">{row.sizeLabel}</td>
                                                            <td className="p-3 text-emerald-600 dark:text-emerald-400 font-medium">{row.allocatedIps.toString()}</td>
                                                            <td className="p-3 text-blue-700 dark:text-blue-400 font-mono font-medium flex items-center gap-2 group">
                                                                <span>{row.network}{row.maskCidr}</span>
                                                                <button onClick={() => executeCopy(`${row.network}${row.maskCidr}`, 'Network copied!', showToast)} className="text-slate-400 hover:text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"><CopyIcon /></button>
                                                            </td>
                                                            <td className="p-3 text-slate-600 dark:text-slate-400 font-mono text-xs">{row.firstUsable} - {row.lastUsable}</td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                            
                            {!results && !error && (
                                <div className="bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 border-dashed rounded-xl h-full flex items-center justify-center p-12 text-center text-slate-400 dark:text-slate-500">
                                    <div className="max-w-xs">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="mx-auto mb-4 text-slate-300 dark:text-slate-600" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 17 22 12"></polyline></svg>
                                        <p>Enter your major network and subnet requirements, then build your plan to see the visual allocation map.</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function Generator({ showToast }) {
            const { history, addHistory, clearHistory } = useHistory('gen_history');
            const [genMode, setGenMode] = useState('network');
            const [genIpInput, setGenIpInput] = useState('192.168.1.0');
            const [genMaskInput, setGenMaskInput] = useState('24');
            const [rangeStartIp, setRangeStartIp] = useState('192.168.1.0');
            const [rangeEndIp, setRangeEndIp] = useState('192.168.1.255');
            const [targetMaskInput, setTargetMaskInput] = useState('26');
            const [genResults, setGenResults] = useState(null);
            const [genError, setGenError] = useState(null);
            const [genSortConfig, setGenSortConfig] = useState({ key: 'no', direction: 'asc' });
            const [filterText, setFilterText] = useState('');

            const displayedGenResults = useMemo(() => {
                let data = genResults;
                if (data && filterText) {
                    const lowerFilter = filterText.toLowerCase();
                    data = data.filter(row => 
                        Object.values(row).some(val => String(val).toLowerCase().includes(lowerFilter))
                    );
                }
                return sortData(data, genSortConfig);
            }, [genResults, genSortConfig, filterText]);

            const handleIpChange = (e, setIp, setMask) => {
                const val = e.target.value;
                if (val.includes('/')) {
                    const [ip, mask] = val.split('/');
                    setIp(ip.trim());
                    if(setMask) setMask(mask.trim());
                } else {
                    setIp(val);
                }
            };

            const generateSubnets = () => {
                setGenError(null);
                const contextIp = genMode === 'network' ? parseIp(genIpInput) : parseIp(rangeStartIp);
                if (!contextIp) { setGenError("Invalid IP Address format."); setGenResults(null); return; }
                const version = contextIp.version;

                const targetMaskData = parseMask(targetMaskInput, version);
                if (targetMaskData === null) { setGenError(`Invalid Target Subnet Mask for IPv${version}.`); setGenResults(null); return; }

                if (genMode === 'network') {
                    addHistory(`${genIpInput}/${genMaskInput}`);
                }

                const targetCidr = targetMaskData.cidr;
                const targetMaskStr = formatIp(targetMaskData.long, version);
                const maxBits = version === 6 ? 128n : 32n;
                const step = 1n << (maxBits - BigInt(targetCidr)); 
                let results = [];

                let usableIpsCount;
                if (version === 4) {
                    if (targetCidr === 32) usableIpsCount = 1n;
                    else if (targetCidr === 31) usableIpsCount = 2n;
                    else usableIpsCount = step - 2n;
                } else {
                    usableIpsCount = step;
                }
                const usableIpsStr = usableIpsCount.toString();

                if (genMode === 'network') {
                    const majorMaskData = parseMask(genMaskInput, version);
                    if (majorMaskData === null) { setGenError("Invalid Major Subnet Mask."); setGenResults(null); return; }

                    const majorCidr = majorMaskData.cidr;
