                                    <li>Click <strong>Summarize IPs</strong> (or press Ctrl+Enter).</li>
                                </ol>
                                <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-lg border border-slate-200 dark:border-slate-700 text-sm">
                                    <strong className="block mb-2 text-slate-800 dark:text-slate-200">Practical Example:</strong>
                                    <span className="text-slate-500 dark:text-slate-400">Input:</span> <code>192.168.1.10 - 192.168.1.25</code><br/>
                                    <span className="text-slate-500 dark:text-slate-400 mt-1 block">Result:</span> The tool calculates that the tightest way to cover these 16 IPs is using two distinct mathematical blocks: <code>192.168.1.8/29</code> (covering .8 to .15) and <code>192.168.1.16/28</code> (covering .16 to .31).
                                </div>
                            </section>

                            <hr className="border-slate-100 dark:border-slate-700/50" />

                            <section>
                                <h3 className="text-lg font-bold text-slate-900 dark:text-slate-100 mb-3 flex items-center gap-2">
                                    <span className="bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm border border-blue-200 dark:border-blue-800">5</span>
                                    Free Space Finder
                                </h3>
                                <p className="mb-2 opacity-90"><strong>Overview:</strong> If you have a large corporate block and have allocated random chunks out of it over the years, this tool will map the entire space logically. It shows you exactly what is "Used" and precisely calculates the CIDR blocks available in the "Free" gaps.</p>
                                <p className="mb-2 opacity-90 font-semibold">How to Use:</p>
                                <ol className="list-decimal pl-6 space-y-2 mb-4 opacity-90">
                                    <li>Enter your overarching corporate block in <strong>Parent Network</strong> (e.g., <code>10.0.0.0/8</code>).</li>
                                    <li>Paste all your known, allocated subnets into the <strong>Used Prefixes</strong> box.</li>
                                    <li>Click <strong>Map Address Space</strong>.</li>
                                    <li>Use the <strong>Free Only</strong> or <strong>Used Only</strong> filter buttons to focus on available contiguous blocks.</li>
                                </ol>
                                <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-lg border border-slate-200 dark:border-slate-700 text-sm">
                                    <strong className="block mb-2 text-slate-800 dark:text-slate-200">Practical Example:</strong>
                                    <span className="text-slate-500 dark:text-slate-400">Input:</span> Parent: <code>172.16.0.0/12</code>, Used: <code>172.16.0.0/16</code><br/>
                                    <span className="text-slate-500 dark:text-slate-400 mt-1 block">Result:</span> The tool maps the space and shows that you have used the first chunk, but the remaining space is available as three perfectly aligned free blocks: <code>172.17.0.0/16</code>, <code>172.18.0.0/15</code>, and <code>172.20.0.0/14</code>.
                                </div>
                            </section>

                            <hr className="border-slate-100 dark:border-slate-700/50" />

                            <section>
                                <h3 className="text-lg font-bold text-slate-900 dark:text-slate-100 mb-3 flex items-center gap-2">
                                    <span className="bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm border border-blue-200 dark:border-blue-800">6</span>
                                    MAC & EUI-64 Utility
                                </h3>
                                <p className="mb-2 opacity-90"><strong>Overview:</strong> Converts MAC addresses across different vendor formats (Cisco, Windows, Linux/Unix) and automatically performs the "bit-flipping" logic required to generate an IPv6 EUI-64 address.</p>
                                <p className="mb-2 opacity-90 font-semibold">How to Use:</p>
                                <ol className="list-decimal pl-6 space-y-2 mb-4 opacity-90">
                                    <li>Enter any MAC address in the <strong>MAC Address</strong> field. (The tool will automatically strip invalid characters, so <code>00:1A:2B:3C:4D:5E</code> and <code>001a.2b3c.4d5e</code> are both fine).</li>
                                    <li>Enter an optional <strong>IPv6 Prefix</strong> (defaults to the link-local prefix <code>fe80::/64</code>).</li>
                                    <li>The results instantly generate as you type.</li>
                                </ol>
                                <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-lg border border-slate-200 dark:border-slate-700 text-sm">
                                    <strong className="block mb-2 text-slate-800 dark:text-slate-200">Practical Example:</strong>
                                    <span className="text-slate-500 dark:text-slate-400">Input:</span> MAC <code>00-1A-2B-3C-4D-5E</code>, Prefix <code>2001:db8:1::/64</code><br/>
                                    <span className="text-slate-500 dark:text-slate-400 mt-1 block">Result:</span><br/>
                                    <ul className="list-disc pl-4 mt-1">
                                        <li>Unix: <code>00:1a:2b:3c:4d:5e</code></li>
                                        <li>Cisco: <code>001a.2b3c.4d5e</code></li>
                                        <li>EUI-64 Interface ID: <code>021a:2bff:fe3c:4d5e</code> (Notice the 7th bit is flipped <code>00</code> &rarr; <code>02</code>, and <code>fffe</code> is injected in the middle).</li>
                                        <li>Full IPv6: <code>2001:db8:1::021a:2bff:fe3c:4d5e</code></li>
                                    </ul>
                                </div>
                            </section>

                            <hr className="border-slate-100 dark:border-slate-700/50" />
                            <section className="text-center mt-6 bg-slate-50 dark:bg-slate-900/50 p-6 rounded-xl border border-slate-200 dark:border-slate-700">
                                <p className="text-slate-600 dark:text-slate-400">
                                    Developed and maintained by <strong>Rizwan Ghani</strong><br/>
                                    <a href="https://www.linkedin.com/in/rizwanghani" target="_blank" className="text-blue-600 dark:text-blue-400 font-bold hover:underline mt-2 inline-flex items-center gap-1.5 transition-colors">
                                        <LinkedInIcon />
                                        linkedin.com/in/rizwanghani
                                    </a>
                                </p>
                            </section>

                        </div>
                        
                        {/* Modal Footer */}
                        <div className="px-6 py-4 border-t border-slate-100 dark:border-slate-700/50 bg-slate-50 dark:bg-slate-800/50 rounded-b-2xl flex justify-end">
                            <button 
                                onClick={onClose}
                                className="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 px-6 py-2 rounded-lg font-medium transition-colors shadow-sm"
                            >
                                Close Guide
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // MAIN APP COMPONENT
        // ==========================================

        function App() {
            // Initial state set to 'calculator'
            const [activeTab, setActiveTab] = useState('calculator');
            const [toastMessage, setToastMessage] = useState('');
            const [isDocsOpen, setIsDocsOpen] = useState(false);

            // Dark Mode State & Logic
            const [isDarkMode, setIsDarkMode] = useState(() => {
                if (typeof window !== 'undefined') {
                    return localStorage.getItem('theme') === 'dark' || 
                        (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
                }
                return false;
            });

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDarkMode]);

            // Global Toast Logic
            const showToast = useCallback((msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 3000);
            }, []);

            return (
                <div className="min-h-screen flex flex-col items-center py-12 px-4 transition-colors duration-200">
                    
                    {/* Header */}
                    <div className="w-full max-w-6xl mb-8 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3 text-blue-600 dark:text-blue-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"></path><path d="M10 12h4"></path></svg>
                            <div>
                                <h1 className="text-3xl font-extrabold text-slate-800 dark:text-slate-100 tracking-tight">IP Address Planning Tools</h1>
                                <div className="text-sm font-medium text-slate-500 dark:text-slate-400 mt-1 flex items-center flex-wrap gap-x-1.5 gap-y-1">
                                    Developed by <strong className="text-slate-700 dark:text-slate-300">Rizwan Ghani</strong>
                                    <span className="hidden sm:inline opacity-50">•</span>
                                    <a href="https://www.linkedin.com/in/rizwanghani" target="_blank" rel="noopener noreferrer" className="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 hover:underline inline-flex items-center gap-1 transition-colors">
                                        <LinkedInIcon /> Connect on LinkedIn
                                    </a>
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            {/* Dark Mode Toggle */}
                            <button 
                                onClick={() => setIsDarkMode(!isDarkMode)}
                                className="p-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-blue-300 dark:hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-blue-700 dark:hover:text-blue-400 rounded-lg transition-all shadow-sm"
                                aria-label="Toggle Dark Mode"
                            >
                                {isDarkMode ? <SunIcon /> : <MoonIcon />}
                            </button>

                            {/* Documentation Button */}
                            <button 
                                onClick={() => setIsDocsOpen(true)}
                                className="flex items-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-blue-300 dark:hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-blue-700 dark:hover:text-blue-400 px-4 py-2 rounded-lg font-semibold text-sm transition-all shadow-sm"
                            >
                                <BookIcon />
                                Documentation
                            </button>
                        </div>
                    </div>

                    <div className="w-full max-w-6xl bg-white dark:bg-slate-800 shadow-md shadow-slate-200/50 dark:shadow-slate-900/50 rounded-2xl border border-slate-200 dark:border-slate-700 p-2 sm:p-6 lg:p-8 transition-colors duration-200">
                        
                        {/* Custom Tab Navigation */}
                        <div className="flex border-b border-slate-200 dark:border-slate-700/50 mb-8 overflow-x-auto whitespace-nowrap hide-scrollbar">
                            <button 
                                className={`py-3 px-6 font-semibold text-sm transition-all relative ${activeTab === 'calculator' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800/80'}`}
                                onClick={() => setActiveTab('calculator')}
                            >
                                IPv4/IPv6 Calculator
                                {activeTab === 'calculator' && <div className="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 dark:bg-blue-400 rounded-t-full"></div>}
                            </button>
                            <button 
                                className={`py-3 px-6 font-semibold text-sm transition-all relative ${activeTab === 'generator' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800/80'}`}
                                onClick={() => setActiveTab('generator')}
                            >
                                Subnet Generator
                                {activeTab === 'generator' && <div className="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 dark:bg-blue-400 rounded-t-full"></div>}
                            </button>
                            <button 
                                className={`py-3 px-6 font-semibold text-sm transition-all relative ${activeTab === 'vlsm' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800/80'}`}
                                onClick={() => setActiveTab('vlsm')}
                            >
                                VLSM & Visual Map
                                {activeTab === 'vlsm' && <div className="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 dark:bg-blue-400 rounded-t-full"></div>}
                            </button>
                            <button 
                                className={`py-3 px-6 font-semibold text-sm transition-all relative ${activeTab === 'from-ips' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800/80'}`}
                                onClick={() => setActiveTab('from-ips')}
                            >
                                IP Summarization
                                {activeTab === 'from-ips' && <div className="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 dark:bg-blue-400 rounded-t-full"></div>}
                            </button>
                            <button 
                                className={`py-3 px-6 font-semibold text-sm transition-all relative ${activeTab === 'free-space' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800/80'}`}
                                onClick={() => setActiveTab('free-space')}
                            >
                                Free Space Finder
                                {activeTab === 'free-space' && <div className="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 dark:bg-blue-400 rounded-t-full"></div>}
                            </button>
                            <button 
                                className={`py-3 px-6 font-semibold text-sm transition-all relative ${activeTab === 'mac' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800/80'}`}
                                onClick={() => setActiveTab('mac')}
                            >
                                MAC & EUI-64
                                {activeTab === 'mac' && <div className="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 dark:bg-blue-400 rounded-t-full"></div>}
                            </button>
                        </div>

                        {/* Tab Content Rendering */}
                        <div className="min-h-[500px]">
                            {activeTab === 'calculator' && <Calculator showToast={showToast} />}
                            {activeTab === 'generator' && <Generator showToast={showToast} />}
                            {activeTab === 'vlsm' && <VlsmPlanner showToast={showToast} />}
                            {activeTab === 'from-ips' && <Summarizer showToast={showToast} />}
                            {activeTab === 'free-space' && <FreeSpaceFinder showToast={showToast} />}
                            {activeTab === 'mac' && <MacUtility showToast={showToast} />}
                        </div>
                    </div>

                    {/* Global Floating Toast */}
                    <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800 dark:bg-slate-700 text-white font-medium rounded-full shadow-lg shadow-slate-900/20 dark:shadow-slate-900/50 flex items-center gap-2 pointer-events-none transition-all duration-300 z-50 ${toastMessage ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                        <svg className="text-emerald-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        {toastMessage}
                    </div>

                    {/* Documentation Modal Overlay */}
                    <DocumentationModal isOpen={isDocsOpen} onClose={() => setIsDocsOpen(false)} />

                    <div className="text-center text-slate-500 dark:text-slate-400 text-sm mt-8 pb-4 flex flex-col items-center gap-1.5">
                        <span>Created by <strong className="text-slate-700 dark:text-slate-300">Rizwan Ghani</strong></span>
                        <a href="https://www.linkedin.com/in/rizwanghani" target="_blank" rel="noopener noreferrer" className="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 hover:underline flex items-center gap-1 transition-colors">
                            <LinkedInIcon /> linkedin.com/in/rizwanghani
                        </a>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
