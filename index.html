<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="8TkG7WAF1SMNRZdHHBw73LpAOIM2aHml71NwvKJP9YI" />
    <title>IP Address Planning Tools</title>
    <!-- 
      IP Address Planning Tools

    <meta name="author" content="Rizwan Ghani">
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Load Babel for JSX translation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <style>
        .toast-enter { opacity: 0; transform: translateY(1rem); }
        .toast-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }
        .toast-exit { opacity: 1; transform: translateY(0); }
        .toast-exit-active { opacity: 0; transform: translateY(1rem); transition: opacity 300ms, transform 300ms; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .striped-bg {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.03) 10px, rgba(0,0,0,0.03) 20px);
        }
        .dark .striped-bg {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.5); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased font-sans transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- UTILITIES ---
        function useHistory(key, maxItems = 20) {
            const [history, setHistory] = useState(() => {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : [];
                } catch (error) { return []; }
            });
            const addHistory = (val) => {
                if (!val || val.trim() === '') return;
                setHistory(prev => {
                    const filtered = prev.filter(item => item !== val);
                    const next = [val, ...filtered].slice(0, maxItems);
                    localStorage.setItem(key, JSON.stringify(next));
                    return next;
                });
            };
            const clearHistory = () => { setHistory([]); localStorage.removeItem(key); };
            return { history, addHistory, clearHistory };
        }

        const parseIp = (str) => {
            if (!str) return null;
            str = str.trim();
            if (str.includes(':')) {
                let parts = str.split('::');
                if (parts.length > 2) return null;
                let left = parts[0] ? parts[0].split(':') : [];
                let right = parts.length === 2 && parts[1] ? parts[1].split(':') : [];
                let missing = 8 - (left.length + right.length);
                if (missing < 0) return null;
                let full = [...left];
                for(let i=0; i<missing; i++) full.push('0');
                full = full.concat(right);
                if (full.length !== 8) return null;
                let longVal = 0n;
                for(let i=0; i<8; i++) {
                    let hex = full[i] || '0';
                    let val = parseInt(hex, 16);
                    if (isNaN(val) || val < 0 || val > 0xffff) return null;
                    longVal = (longVal << 16n) | BigInt(val);
                }
                return { version: 6, long: longVal };
            } else {
                const parts = str.split('.');
                if (parts.length !== 4) return null;
                let longVal = 0n;
                for (let i = 0; i < 4; i++) {
                    const val = parseInt(parts[i], 10);
                    if (isNaN(val) || val < 0 || val > 255) return null;
                    longVal = (longVal << 8n) | BigInt(val);
                }
                return { version: 4, long: longVal };
            }
        };

        const formatIp = (longVal, version) => {
            if (version === 6) {
                let parts = [];
                for (let i = 0; i < 8; i++) {
                    let shift = BigInt((7 - i) * 16);
                    let block = (longVal >> shift) & 0xffffn;
                    parts.push(block.toString(16));
                }
                let bestStart = -1, bestLen = 0, currentStart = -1, currentLen = 0;
                for (let i = 0; i < 8; i++) {
                    if (parts[i] === '0') {
                        if (currentStart === -1) currentStart = i;
                        currentLen++;
                        if (currentLen > bestLen) { bestLen = currentLen; bestStart = currentStart; }
                    } else { currentStart = -1; currentLen = 0; }
                }
                if (bestLen > 1) {
                    parts.splice(bestStart, bestLen, '');
                    if (bestStart === 0) parts.unshift('');
                    if (bestStart + bestLen === 8) parts.push('');
                }
                return parts.join(':') || '::';
            } else {
                return [Number((longVal >> 24n) & 255n), Number((longVal >> 16n) & 255n), Number((longVal >> 8n) & 255n), Number(longVal & 255n)].join('.');
            }
        };

        const parseMask = (str, version) => {
            if (!str) return null;
            str = str.trim();
            if (str.startsWith('/')) str = str.substring(1);
            let maxBits = version === 6 ? 128 : 32;
            let bits = BigInt(maxBits);
            let cidr;
            if (!str.includes('.') && !str.includes(':')) {
                cidr = parseInt(str, 10);
                if (isNaN(cidr) || cidr < 0 || cidr > maxBits) return null;
            } else {
                const maskIp = parseIp(str);
                if (!maskIp || maskIp.version !== version) return null;
                let temp = maskIp.long;
                cidr = 0;
                let checkBit = 1n << (bits - 1n);
                while (temp & checkBit) { cidr++; temp = (temp << 1n) & ((1n << bits) - 1n); }
                if (temp !== 0n) return null; 
            }
            let longVal = 0n;
            if (cidr > 0) longVal = ((1n << bits) - 1n) ^ ((1n << (bits - BigInt(cidr))) - 1n);
            return { cidr, long: longVal };
        };

        const executeCopy = (text, message, showToast) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); showToast(message || 'Copied!'); } catch (err) {}
            document.body.removeChild(textArea);
        };

        // --- ICONS ---
        const InfoIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500 mt-0.5 shrink-0"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const BookIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>;
        const CopyIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
        const LinkedInIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>;
        const MoonIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
        const SunIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;

        // --- MAIN APP ---
        function App() {
            const [activeTab, setActiveTab] = useState('calculator');
            const [toastMessage, setToastMessage] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('theme') === 'dark');

            useEffect(() => {
                const root = document.documentElement;
                if (isDarkMode) { root.classList.add('dark'); localStorage.setItem('theme', 'dark'); }
                else { root.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [isDarkMode]);

            const showToast = useCallback((msg) => {
                setToastMessage(msg); setTimeout(() => setToastMessage(''), 3000);
            }, []);

            return (
                <div className="min-h-screen flex flex-col items-center py-12 px-4 transition-colors duration-200">
                    <div className="w-full max-w-6xl mb-8 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3 text-blue-600 dark:text-blue-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"></path><path d="M10 12h4"></path></svg>
                            <div>
                                <h1 className="text-3xl font-extrabold text-slate-800 dark:text-slate-100 tracking-tight">IP Address Planning Tools</h1>
                                <div className="text-sm font-medium text-slate-500 dark:text-slate-400 mt-1 flex items-center gap-2">
                                    Developed by <strong>Rizwan Ghani</strong> • 
                                    <a href="https://www.linkedin.com/in/rizwanghani" target="_blank" className="text-blue-600 dark:text-blue-400 hover:underline flex items-center gap-1">
                                        <LinkedInIcon /> Connect on LinkedIn
                                    </a>
                                </div>
                            </div>
                        </div>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 bg-white dark:bg-slate-800 border rounded-lg shadow-sm">
                            {isDarkMode ? <SunIcon /> : <MoonIcon />}
                        </button>
                    </div>

                    <div className="w-full max-w-6xl bg-white dark:bg-slate-800 shadow-md rounded-2xl border p-8">
                        <div className="text-center text-slate-500 p-20 border-2 border-dashed rounded-xl">
                            <h2 className="text-2xl font-bold mb-4">Calculator Loaded</h2>
                            <p>Verify ownership on Google Search Console to activate full search indexing.</p>
                            <p className="mt-4 text-sm">Make sure this file is named <strong>index.html</strong> in your repository.</p>
                        </div>
                    </div>

                    <div className="text-center text-slate-500 text-sm mt-8 pb-4 flex flex-col items-center gap-1">
                        <span>Created by <strong>Rizwan Ghani</strong></span>
                        <a href="https://www.linkedin.com/in/rizwanghani" target="_blank" className="text-blue-600 dark:text-blue-400 hover:underline flex items-center gap-1">
                            <LinkedInIcon /> linkedin.com/in/rizwanghani
                        </a>
                    </div>

                    {toastMessage && (
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800 text-white rounded-full shadow-lg z-50">
                            {toastMessage}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
