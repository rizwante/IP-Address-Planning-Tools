                    if (targetCidr < majorCidr) { setGenError("Target mask must be smaller (larger CIDR number) than major mask."); setGenResults(null); return; }

                    const numSubnets = 1n << BigInt(targetCidr - majorCidr);
                    if (numSubnets > 4096n) { setGenError(`Too many subnets (${numSubnets}). Limit to 4096 max.`); setGenResults(null); return; }

                    const majorNetworkLong = (contextIp.long & majorMaskData.long);
                    
                    for (let i = 0n; i < numSubnets; i++) {
                        const netLong = majorNetworkLong + (i * step);
                        const bcastLong = netLong + step - 1n;
                        
                        let firstLong, lastLong;
                        if (version === 4) {
                            firstLong = targetCidr >= 31 ? netLong : netLong + 1n;
                            lastLong = targetCidr === 32 ? netLong : (targetCidr === 31 ? bcastLong : bcastLong - 1n);
                        } else {
                            firstLong = netLong;
                            lastLong = bcastLong;
                        }

                        results.push({ no: Number(i + 1n), network: formatIp(netLong, version), maskDecimal: targetMaskStr, maskCidr: `/${targetCidr}`, usableIpsCount: usableIpsStr, firstUsable: formatIp(firstLong, version), lastUsable: formatIp(lastLong, version), broadcast: formatIp(bcastLong, version) });
                    }
                } else {
                    const endIpData = parseIp(rangeEndIp);
                    if (!endIpData || endIpData.version !== version) { setGenError("End IP is invalid or version mismatch."); setGenResults(null); return; }

                    const startLong = contextIp.long;
                    const endLong = endIpData.long;

                    if (startLong > endLong) { setGenError("Start IP must be <= End IP."); setGenResults(null); return; }

                    let currentNetLong = startLong & targetMaskData.long;
                    let count = 0n;

                    while (currentNetLong <= endLong) {
                        if (count >= 4096n) { setGenError("Output capped at 4096 subnets."); break; }

                        const bcastLong = currentNetLong + step - 1n;
                        let firstLong, lastLong;
                        if (version === 4) {
                            firstLong = targetCidr >= 31 ? currentNetLong : currentNetLong + 1n;
                            lastLong = targetCidr === 32 ? currentNetLong : (targetCidr === 31 ? bcastLong : bcastLong - 1n);
                        } else {
                            firstLong = currentNetLong;
                            lastLong = bcastLong;
                        }

                        results.push({ no: Number(count + 1n), network: formatIp(currentNetLong, version), maskDecimal: targetMaskStr, maskCidr: `/${targetCidr}`, usableIpsCount: usableIpsStr, firstUsable: formatIp(firstLong, version), lastUsable: formatIp(lastLong, version), broadcast: formatIp(bcastLong, version) });

                        currentNetLong = currentNetLong + step;
                        count++;
                        if (currentNetLong < step) break; 
                    }
                }
                setGenResults(results);
                showToast(`Generated ${results.length} subnets`);
            };

            const copyToExcel = () => {
                if (!displayedGenResults) return;
                let text = "No.\tSubnet\tMask (Decimal)\tMask (CIDR)\tUsable IPs\t1st Usable IP\tLast Usable IP\tBroadcast\n";
                text += displayedGenResults.map(r => `${r.no}\t${r.network}\t${r.maskDecimal}\t${r.maskCidr}\t${r.usableIpsCount}\t${r.firstUsable}\t${r.lastUsable}\t${r.broadcast}`).join('\n');
                executeCopy(text, 'Table copied to Excel format!', showToast);
            };

            return (
                <div className="animate-in fade-in duration-300">
                    <div className="bg-blue-50/50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 rounded-xl p-4 mb-8 flex gap-3 text-sm text-blue-900 dark:text-blue-100 shadow-sm">
                        <InfoIcon />
                        <div>
                            <strong className="block font-semibold mb-1">How to use the Subnet Generator</strong>
                            <ul className="list-disc pl-4 space-y-1 opacity-90">
                                <li><strong>By Major Network:</strong> Breaks a large network (e.g., <code>10.0.0.0/8</code>) into many smaller subnets of a target size.</li>
                                <li><strong>By IP Range:</strong> Finds all subnets of a specific target size that fit exactly between a Start IP and End IP.</li>
                            </ul>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 mb-8">
                        <div className="flex gap-6 mb-5">
                            <label className="flex items-center gap-2 cursor-pointer group">
                                <input type="radio" checked={genMode === 'network'} onChange={() => setGenMode('network')} className="text-blue-600 focus:ring-blue-500 cursor-pointer" />
                                <span className="text-sm font-semibold text-slate-700 dark:text-slate-200 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">By Major Network</span>
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer group">
                                <input type="radio" checked={genMode === 'range'} onChange={() => setGenMode('range')} className="text-blue-600 focus:ring-blue-500 cursor-pointer" />
                                <span className="text-sm font-semibold text-slate-700 dark:text-slate-200 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">By IP Range</span>
                            </label>
                        </div>
                        <div className="flex flex-wrap gap-4 items-end">
                            {genMode === 'network' ? (
                                <React.Fragment>
                                    <div className="flex-1 min-w-[150px]">
                                        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">Major Network IP</label>
                                        <input type="text" value={genIpInput} onChange={(e) => handleIpChange(e, setGenIpInput, setGenMaskInput)} onKeyDown={(e) => e.key === 'Enter' && generateSubnets()} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono" placeholder="e.g. 10.0.0.0/8" />
                                    </div>
                                    <div className="hidden sm:block text-2xl font-light text-slate-300 dark:text-slate-600 mb-2">/</div>
                                    <div className="w-24">
                                        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">Major Mask</label>
                                        <input type="text" value={genMaskInput} onChange={(e) => setGenMaskInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && generateSubnets()} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono" />
                                    </div>
                                </React.Fragment>
                            ) : (
                                <React.Fragment>
                                    <div className="flex-1 min-w-[150px]">
                                        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">Start IP</label>
                                        <input type="text" value={rangeStartIp} onChange={(e) => setRangeStartIp(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && generateSubnets()} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono" />
                                    </div>
                                    <div className="hidden sm:block text-xl font-light text-slate-300 dark:text-slate-600 mb-2">-</div>
                                    <div className="flex-1 min-w-[150px]">
                                        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">End IP</label>
                                        <input type="text" value={rangeEndIp} onChange={(e) => setRangeEndIp(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && generateSubnets()} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono" />
                                    </div>
                                </React.Fragment>
                            )}
                            <div className="hidden md:block text-xl font-light text-slate-300 dark:text-slate-600 mb-2 px-2">➔</div>
                            <div className="w-24">
                                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">Target Mask</label>
                                <input type="text" value={targetMaskInput} onChange={(e) => setTargetMaskInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && generateSubnets()} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono" />
                            </div>
                            <button onClick={generateSubnets} className="bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-semibold shadow-sm transition-colors focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">Generate</button>
                        </div>
                        {genError && <div className="text-red-500 dark:text-red-400 text-sm mt-3 flex items-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>{genError}</div>}
                        
                        {genMode === 'network' && <HistoryPills history={history} onClear={clearHistory} onSelect={(val) => {
                            if (val.includes('/')) {
                                const [ip, mask] = val.split('/');
                                setGenIpInput(ip); setGenMaskInput(mask);
                            }
                        }} />}
                    </div>

                    {displayedGenResults && (
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                            <div className="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <span className="text-sm text-slate-600 dark:text-slate-300 font-medium">Generated <strong className="text-slate-900 dark:text-slate-100">{displayedGenResults.length}</strong> subnets {filterText && <span className="text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded text-xs ml-2">Filtered</span>}</span>
                                <div className="flex items-center gap-3 w-full sm:w-auto">
                                    <div className="relative flex-1 sm:flex-none">
                                        <svg className="absolute left-2.5 top-2 text-slate-400 dark:text-slate-500" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                        <input 
                                            type="text" 
                                            placeholder="Filter..." 
                                            value={filterText}
                                            onChange={(e) => setFilterText(e.target.value)}
                                            className="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 pl-8 pr-3 py-1.5 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-48 transition-shadow"
                                        />
                                    </div>
                                    <button onClick={copyToExcel} className="text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 px-3 py-1.5 rounded-md flex items-center gap-1.5 transition-colors shadow-sm whitespace-nowrap">
                                        <ExcelIcon /> Copy
                                    </button>
                                </div>
                            </div>
                            <div className="overflow-x-auto max-h-[500px]">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-white dark:bg-slate-800 sticky top-0 shadow-sm z-10">
                                        <tr className="border-b border-slate-200 dark:border-slate-700/50">
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('no', genSortConfig, setGenSortConfig)}>No. {getSortIcon('no', genSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('network', genSortConfig, setGenSortConfig)}>Subnet {getSortIcon('network', genSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('maskDecimal', genSortConfig, setGenSortConfig)}>Mask (Dec) {getSortIcon('maskDecimal', genSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('maskCidr', genSortConfig, setGenSortConfig)}>CIDR {getSortIcon('maskCidr', genSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('usableIpsCount', genSortConfig, setGenSortConfig)}>Usable IPs {getSortIcon('usableIpsCount', genSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('firstUsable', genSortConfig, setGenSortConfig)}>1st Usable IP {getSortIcon('firstUsable', genSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('lastUsable', genSortConfig, setGenSortConfig)}>Last Usable IP {getSortIcon('lastUsable', genSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('broadcast', genSortConfig, setGenSortConfig)}>Broadcast {getSortIcon('broadcast', genSortConfig)}</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50">
                                        {displayedGenResults.map((row, idx) => (
                                            <tr key={idx} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                                                <td className="p-3 text-slate-500 dark:text-slate-400">{row.no}</td>
                                                <td className="p-3 text-blue-700 dark:text-blue-400 font-mono font-medium">{row.network}</td>
                                                <td className="p-3 text-slate-600 dark:text-slate-400 font-mono text-xs">{row.maskDecimal}</td>
                                                <td className="p-3 text-slate-600 dark:text-slate-300 font-mono font-medium">{row.maskCidr}</td>
                                                <td className="p-3 text-slate-600 dark:text-slate-300 font-medium">{row.usableIpsCount}</td>
                                                <td className="p-3 text-emerald-600 dark:text-emerald-400 font-mono">{row.firstUsable}</td>
                                                <td className="p-3 text-emerald-600 dark:text-emerald-400 font-mono">{row.lastUsable}</td>
                                                <td className="p-3 text-slate-600 dark:text-slate-300 font-mono">{row.broadcast}</td>
                                            </tr>
                                        ))}
                                        {displayedGenResults.length === 0 && (
                                            <tr><td colSpan="7" className="p-8 text-center text-slate-400 dark:text-slate-500">No matching subnets found for "{filterText}".</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Summarizer({ showToast }) {
            const [ipListInput, setIpListInput] = useState("10.135.8.20\n192.168.1.10 - 192.168.1.25\n2001:db8::1 - 2001:db8::50");
            const [targetMaskInput, setTargetMaskInput] = useState("");
            const [ipListResults, setIpListResults] = useState(null);
            const [ipListError, setIpListError] = useState(null);
            const [ipListSortConfig, setIpListSortConfig] = useState({ key: 'no', direction: 'asc' });
            const [filterText, setFilterText] = useState('');

            const displayedIpListResults = useMemo(() => {
                let data = ipListResults;
                if (data && filterText) {
                    const lowerFilter = filterText.toLowerCase();
                    data = data.filter(row => 
                        Object.values(row).some(val => String(val).toLowerCase().includes(lowerFilter))
                    );
                }
                return sortData(data, ipListSortConfig);
            }, [ipListResults, ipListSortConfig, filterText]);

            const generateFromIpsList = () => {
                setIpListError(null);
                const rawTokens = ipListInput.split(/[\r\n,]+/).map(t => t.trim()).filter(t => t);
                
                if (rawTokens.length === 0) { setIpListError("No valid IP addresses or ranges."); setIpListResults(null); return; }

                let ranges = [];
                let detectedVersion = null;

                for (const token of rawTokens) {
                    let startData, endData;
                    if (token.includes('-')) {
                        const parts = token.split('-').map(s => s.trim());
                        if (parts.length !== 2) continue;
                        startData = parseIp(parts[0]);
                        endData = parseIp(parts[1]);
                    } else {
                        startData = parseIp(token);
                        endData = startData;
                    }

                    if (!startData || !endData || startData.version !== endData.version) {
                        setIpListError(`Invalid or mismatched IP format found: "${token}"`); setIpListResults(null); return; 
                    }
                    if (startData.long > endData.long) {
                        setIpListError(`Start IP must be <= End IP: "${token}"`); setIpListResults(null); return;
                    }

                    if (!detectedVersion) detectedVersion = startData.version;
                    else if (detectedVersion !== startData.version) {
                        setIpListError(`Mixed IPv4 and IPv6 addresses not supported in Summarization simultaneously.`); setIpListResults(null); return;
                    }

                    ranges.push([startData.long, endData.long]);
                }

                let optionalTargetMask = null;
                if (targetMaskInput.trim() !== '') {
                    optionalTargetMask = parseMask(targetMaskInput, detectedVersion);
                    if (!optionalTargetMask) {
                        setIpListError(`Invalid Target Subnet Mask for IPv${detectedVersion}.`); 
                        setIpListResults(null); 
                        return;
                    }
                }

                ranges.sort((a, b) => a[0] < b[0] ? -1 : (a[0] > b[0] ? 1 : 0));

                let mergedRanges = [];
                let currentRange = ranges[0];
                for (let i = 1; i < ranges.length; i++) {
                    if (ranges[i][0] <= currentRange[1] + 1n) currentRange[1] = currentRange[1] > ranges[i][1] ? currentRange[1] : ranges[i][1];
                    else { mergedRanges.push(currentRange); currentRange = ranges[i]; }
                }
                mergedRanges.push(currentRange);

                let cidrMap = new Map();
                const maxBits = BigInt(detectedVersion === 6 ? 128 : 32);

                if (optionalTargetMask) {
                    const targetCidr = optionalTargetMask.cidr;
                    const maskLong = optionalTargetMask.long;
                    const step = targetCidr === 0 ? (1n << maxBits) : (1n << (maxBits - BigInt(targetCidr)));

                    for (const [start, end] of mergedRanges) {
                        let current = start;
                        while (current <= end) {
                            let netLong = current & maskLong;
                            let bcastLong = targetCidr === 0 ? ((1n << maxBits) - 1n) : (netLong + step - 1n);
                            let chunkEnd = end < bcastLong ? end : bcastLong;
                            let usedCount = chunkEnd - current + 1n;

                            const key = `${netLong}/${targetCidr}`;
                            if (!cidrMap.has(key)) {
                                cidrMap.set(key, { network: netLong, cidr: targetCidr, usedStart: current, usedEnd: chunkEnd, usedCount: usedCount });
                            } else {
                                let existing = cidrMap.get(key);
                                existing.usedStart = existing.usedStart < current ? existing.usedStart : current;
                                existing.usedEnd = existing.usedEnd > chunkEnd ? existing.usedEnd : chunkEnd;
                                existing.usedCount += usedCount;
                            }
                            
                            current = bcastLong + 1n;
                            if (current > ((1n << maxBits) - 1n)) break;
                        }
                    }
                } else {
                    for (const [start, end] of mergedRanges) {
                        let shift = 0n;
                        let tempXor = start ^ end;
                        while (tempXor > 0n) { tempXor >>= 1n; shift++; }
                        
                        let targetCidr = Number(maxBits - shift);
                        let maskLong = targetCidr === 0 ? 0n : ((1n << maxBits) - 1n) ^ ((1n << shift) - 1n);
                        let netLong = start & maskLong;

                        let usedIPsCount = end - start + 1n;

                        const key = `${netLong}/${targetCidr}`;
                        if (!cidrMap.has(key)) {
                            cidrMap.set(key, { network: netLong, cidr: targetCidr, usedStart: start, usedEnd: end, usedCount: usedIPsCount });
                        } else {
                            let existing = cidrMap.get(key);
                            existing.usedStart = existing.usedStart < start ? existing.usedStart : start;
                            existing.usedEnd = existing.usedEnd > end ? existing.usedEnd : end;
                            existing.usedCount += usedIPsCount;
                        }
                    }
                }

                let cidrResults = Array.from(cidrMap.values());
                cidrResults.sort((a, b) => a.network !== b.network ? (a.network < b.network ? -1 : 1) : a.cidr - b.cidr);

                const results = cidrResults.map((item, idx) => {
                    const step = item.cidr === 0 ? (1n << maxBits) : (1n << (maxBits - BigInt(item.cidr)));
                    const bcastLong = item.cidr === 0 ? ((1n << maxBits) - 1n) : (item.network + step - 1n);
                    const maskLong = item.cidr === 0 ? 0n : ((1n << maxBits) - 1n) ^ ((1n << (maxBits - BigInt(item.cidr))) - 1n);
                    const targetMaskStr = formatIp(maskLong, detectedVersion);

                    let firstLong, lastLong;
                    if (detectedVersion === 4) {
                        firstLong = item.cidr >= 31 ? item.network : (item.cidr === 0 ? 1n : item.network + 1n);
                        lastLong = item.cidr === 32 ? item.network : (item.cidr === 31 ? bcastLong : (item.cidr === 0 ? ((1n << 32n) - 2n) : bcastLong - 1n));
                    } else {
                        firstLong = item.network;
                        lastLong = bcastLong;
                    }

                    return {
                        no: idx + 1, network: formatIp(item.network, detectedVersion), maskDecimal: targetMaskStr, maskCidr: `/${item.cidr}`,
                        firstUsed: formatIp(item.usedStart, detectedVersion), lastUsed: formatIp(item.usedEnd, detectedVersion),
                        usedCount: item.usedCount.toString(), freeCount: (step - item.usedCount).toString(),
                        firstUsable: formatIp(firstLong, detectedVersion), lastUsable: formatIp(lastLong, detectedVersion), broadcast: formatIp(bcastLong, detectedVersion)
                    };
                });

                setIpListResults(results);
                showToast(`Summarized into ${results.length} blocks`);
            };

            const copyToExcel = () => {
                if (!displayedIpListResults) return;
                let text = "No.\tSubnet\tMask (Decimal)\tMask (CIDR)\t1st Used IP\tLast Used IP\tUsed IPs\tFree IPs\t1st Usable IP\tLast Usable IP\tBroadcast\n";
                text += displayedIpListResults.map(r => `${r.no}\t${r.network}\t${r.maskDecimal}\t${r.maskCidr}\t${r.firstUsed}\t${r.lastUsed}\t${r.usedCount}\t${r.freeCount}\t${r.firstUsable}\t${r.lastUsable}\t${r.broadcast}`).join('\n');
                executeCopy(text, 'Summarized table copied to Excel!', showToast);
            };

            return (
                <div className="animate-in fade-in duration-300">
                    <div className="bg-blue-50/50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 rounded-xl p-4 mb-8 flex gap-3 text-sm text-blue-900 dark:text-blue-100 shadow-sm">
                        <InfoIcon />
                        <div>
                            <strong className="block font-semibold mb-1">How to use IP Summarization (Supernetting)</strong>
                            <ul className="list-disc pl-4 space-y-1 opacity-90">
                                <li>Takes a messy list of IPs/Ranges and computes the tightest optimal CIDR blocks needed to contain them all.</li>
                                <li><strong>Target Mask:</strong> Leave it blank for the tightest possible fit. Or, enter a Target Mask (like <code>24</code>) to force it to group the IPs into chunks of exactly that size.</li>
                            </ul>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 mb-8">
                        <div className="flex flex-col gap-4">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2 flex justify-between">
                                    <span>List of IP Addresses or Ranges</span>
                                    <span className="font-normal text-slate-400 dark:text-slate-500">Comma, space, or newline separated</span>
                                </label>
                                <textarea 
                                    value={ipListInput} 
                                    onChange={(e) => setIpListInput(e.target.value)} 
                                    onKeyDown={(e) => (e.ctrlKey || e.metaKey) && e.key === 'Enter' && generateFromIpsList()}
                                    className="w-full h-36 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono shadow-inner transition-shadow custom-scrollbar" 
                                    placeholder="Example:&#10;192.168.1.15&#10;10.0.0.1 - 10.0.0.50&#10;2001:db8::1/64" 
                                />
                            </div>
                            <div className="flex flex-wrap items-end gap-4 mt-2">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">Target Mask <span className="font-normal text-slate-400 dark:text-slate-500">(Optional)</span></label>
                                    <input type="text" value={targetMaskInput} onChange={(e) => setTargetMaskInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && generateFromIpsList()} className="w-32 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. 24" />
                                </div>
                                <button onClick={generateFromIpsList} className="bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-semibold shadow-sm transition-colors focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">Summarize IPs</button>
                                <span className="text-sm text-slate-500 dark:text-slate-400 pb-1.5">Leave mask blank for auto-sizing. (Use <strong>Ctrl+Enter</strong> in text box to calc)</span>
                            </div>
                        </div>
                        {ipListError && <div className="text-red-500 dark:text-red-400 text-sm mt-3 flex items-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>{ipListError}</div>}
                    </div>

                    {displayedIpListResults && (
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                            <div className="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <span className="text-sm text-slate-600 dark:text-slate-300 font-medium">Summarized into <strong className="text-slate-900 dark:text-slate-100">{displayedIpListResults.length}</strong> blocks {filterText && <span className="text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded text-xs ml-2">Filtered</span>}</span>
                                <div className="flex items-center gap-3 w-full sm:w-auto">
                                    <div className="relative flex-1 sm:flex-none">
                                        <svg className="absolute left-2.5 top-2 text-slate-400 dark:text-slate-500" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                        <input 
                                            type="text" 
                                            placeholder="Filter..." 
                                            value={filterText}
                                            onChange={(e) => setFilterText(e.target.value)}
                                            className="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 pl-8 pr-3 py-1.5 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-48 transition-shadow"
                                        />
                                    </div>
                                    <button onClick={copyToExcel} className="text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 px-3 py-1.5 rounded-md flex items-center gap-1.5 transition-colors shadow-sm whitespace-nowrap">
                                        <ExcelIcon /> Copy
                                    </button>
                                </div>
                            </div>
                            <div className="overflow-x-auto max-h-[500px]">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-white dark:bg-slate-800 sticky top-0 shadow-sm z-10">
                                        <tr className="border-b border-slate-200 dark:border-slate-700/50">
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('no', ipListSortConfig, setIpListSortConfig)}>No. {getSortIcon('no', ipListSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('network', ipListSortConfig, setIpListSortConfig)}>Subnet {getSortIcon('network', ipListSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('maskDecimal', ipListSortConfig, setIpListSortConfig)}>Mask (Dec) {getSortIcon('maskDecimal', ipListSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('maskCidr', ipListSortConfig, setIpListSortConfig)}>CIDR {getSortIcon('maskCidr', ipListSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('firstUsed', ipListSortConfig, setIpListSortConfig)}>1st Used IP {getSortIcon('firstUsed', ipListSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('lastUsed', ipListSortConfig, setIpListSortConfig)}>Last Used IP {getSortIcon('lastUsed', ipListSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('usedCount', ipListSortConfig, setIpListSortConfig)}>Used IPs {getSortIcon('usedCount', ipListSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('freeCount', ipListSortConfig, setIpListSortConfig)}>Free IPs {getSortIcon('freeCount', ipListSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('firstUsable', ipListSortConfig, setIpListSortConfig)}>1st Usable IP {getSortIcon('firstUsable', ipListSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('lastUsable', ipListSortConfig, setIpListSortConfig)}>Last Usable IP {getSortIcon('lastUsable', ipListSortConfig)}</th>
                                            <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer select-none transition-colors" onClick={() => requestSort('broadcast', ipListSortConfig, setIpListSortConfig)}>Broadcast {getSortIcon('broadcast', ipListSortConfig)}</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50">
                                        {displayedIpListResults.map((row, idx) => (
                                            <tr key={idx} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                                                <td className="p-3 text-slate-500 dark:text-slate-400">{row.no}</td>
                                                <td className="p-3 text-blue-700 dark:text-blue-400 font-mono font-medium">{row.network}</td>
                                                <td className="p-3 text-slate-600 dark:text-slate-400 font-mono text-xs">{row.maskDecimal}</td>
                                                <td className="p-3 text-slate-600 dark:text-slate-300 font-mono font-medium">{row.maskCidr}</td>
                                                <td className="p-3 text-purple-600 dark:text-purple-400 font-mono">{row.firstUsed}</td>
                                                <td className="p-3 text-purple-600 dark:text-purple-400 font-mono">{row.lastUsed}</td>
                                                <td className="p-3 text-slate-600 dark:text-slate-300 font-medium">{row.usedCount}</td>
                                                <td className="p-3 text-slate-600 dark:text-slate-400">{row.freeCount}</td>
                                                <td className="p-3 text-emerald-600 dark:text-emerald-400 font-mono">{row.firstUsable}</td>
                                                <td className="p-3 text-emerald-600 dark:text-emerald-400 font-mono">{row.lastUsable}</td>
                                                <td className="p-3 text-slate-600 dark:text-slate-300 font-mono">{row.broadcast}</td>
                                            </tr>
                                        ))}
                                        {displayedIpListResults.length === 0 && (
                                            <tr><td colSpan="11" className="p-8 text-center text-slate-400 dark:text-slate-500">No matching subnets found for "{filterText}".</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // FREE SPACE FINDER COMPONENT
        // ==========================================
        function FreeSpaceFinder({ showToast }) {
            const { history, addHistory, clearHistory } = useHistory('free_space_history');
            const [parentNetwork, setParentNetwork] = useState('10.0.0.0/8');
            const [usedPrefixesInput, setUsedPrefixesInput] = useState('10.135.8.16/28\n10.135.1.16/28');
            const [results, setResults] = useState(null);
            const [error, setError] = useState(null);
            const [sortConfig, setSortConfig] = useState({ key: 'network', direction: 'asc' });
            const [displayFilter, setDisplayFilter] = useState('all'); // 'all', 'free', 'used'

            const displayedResults = useMemo(() => {
                if (!results) return null;
                
                // Filter
                let filtered = results.allBlocks;
                if (displayFilter === 'free') filtered = filtered.filter(b => b.type === 'Free');
                if (displayFilter === 'used') filtered = filtered.filter(b => b.type === 'Used');

                // Sort
                return sortData(filtered, sortConfig);
            }, [results, sortConfig, displayFilter]);

            const calculateFreeSpace = () => {
                setError(null);
                
                // 1. Parse Parent Network
                const [parentIpStr, parentMaskStr] = parentNetwork.split('/');
                if (!parentIpStr || !parentMaskStr) return setError("Parent network must be in CIDR format (e.g., 10.0.0.0/8)");
                
                const parentIpData = parseIp(parentIpStr);
                if (!parentIpData) return setError("Invalid parent IP address.");
                
                const version = parentIpData.version;
                const parentMaskData = parseMask(parentMaskStr, version);
                if (!parentMaskData) return setError("Invalid parent CIDR mask.");
                
                addHistory(parentNetwork);

                const maxBits = version === 6 ? 128 : 32;
                const parentNetworkLong = parentIpData.long & parentMaskData.long;
                const parentBroadcastLong = parentNetworkLong | ((1n << BigInt(maxBits - parentMaskData.cidr)) - 1n);

                // 2. Parse Used Prefixes
                const rawTokens = usedPrefixesInput.split(/[\r\n,]+/).map(t => t.trim()).filter(t => t);
                let usedRanges = [];

                for (const token of rawTokens) {
                    if (token.includes('/')) {
                        const [ipStr, maskStr] = token.split('/');
                        const ipData = parseIp(ipStr);
                        const maskData = parseMask(maskStr, version);
                        if (ipData && maskData && ipData.version === version) {
                            const netLong = ipData.long & maskData.long;
                            const bcastLong = netLong | ((1n << BigInt(maxBits - maskData.cidr)) - 1n);
                            usedRanges.push([netLong, bcastLong]);
                        }
                    } else if (token.includes('-')) {
                        const [startStr, endStr] = token.split('-');
                        const startData = parseIp(startStr);
                        const endData = parseIp(endStr);
                        if (startData && endData && startData.version === version) {
                            usedRanges.push([startData.long, endData.long]);
                        }
                    } else {
                        // Single IP
                        const ipData = parseIp(token);
                        if (ipData && ipData.version === version) {
                            usedRanges.push([ipData.long, ipData.long]);
                        }
                    }
                }

                // 3. Clamp Used Ranges to Parent Boundaries and Filter invalid
                let clampedRanges = [];
                for (const [start, end] of usedRanges) {
                    let cStart = start < parentNetworkLong ? parentNetworkLong : start;
                    let cEnd = end > parentBroadcastLong ? parentBroadcastLong : end;
                    if (cStart <= cEnd) {
                        clampedRanges.push([cStart, cEnd]);
                    }
                }

                // 4. Sort and Merge Clamped Ranges
                clampedRanges.sort((a, b) => a[0] < b[0] ? -1 : (a[0] > b[0] ? 1 : 0));
                let mergedRanges = [];
                if (clampedRanges.length > 0) {
                    let current = clampedRanges[0];
                    for (let i = 1; i < clampedRanges.length; i++) {
                        if (clampedRanges[i][0] <= current[1] + 1n) {
                            current[1] = current[1] > clampedRanges[i][1] ? current[1] : clampedRanges[i][1];
                        } else {
                            mergedRanges.push(current);
                            current = clampedRanges[i];
                        }
                    }
                    mergedRanges.push(current);
                }

                // 5. Calculate Gaps (Free Space)
                let freeGaps = [];
                let pointer = parentNetworkLong;

                for (const [usedStart, usedEnd] of mergedRanges) {
                    if (pointer < usedStart) {
                        freeGaps.push([pointer, usedStart - 1n]);
                    }
                    pointer = usedEnd + 1n;
                }
                if (pointer <= parentBroadcastLong) {
                    freeGaps.push([pointer, parentBroadcastLong]);
                }

                // 6. Convert both Gaps & Used spaces to perfectly aligned CIDR blocks
                let allBlocks = [];
                let totalFreeIps = 0n;
                let totalUsedIps = 0n;

                // Process Used Spaces
                for (const [s, e] of mergedRanges) {
                    const cidrsInRange = rangeToCidrs(s, e, maxBits);
                    cidrsInRange.forEach(b => {
                        allBlocks.push({ ...b, type: 'Used' });
                        totalUsedIps += b.size;
                    });
                }

                // Process Free Gaps
                for (const [gapStart, gapEnd] of freeGaps) {
                    const cidrsInRange = rangeToCidrs(gapStart, gapEnd, maxBits);
                    cidrsInRange.forEach(b => {
                        allBlocks.push({ ...b, type: 'Free' });
                        totalFreeIps += b.size;
                    });
                }

                // 7. Sort all combined blocks chronologically
                allBlocks.sort((a, b) => a.networkLong < b.networkLong ? -1 : (a.networkLong > b.networkLong ? 1 : 0));

                let finalFormattedBlocks = allBlocks.map((block, idx) => {
                    return {
                        no: idx + 1,
                        network: formatIp(block.networkLong, version),
                        maskCidr: `/${block.cidr}`,
                        size: block.size,
                        sizeFormatted: block.size.toString(),
                        firstIp: formatIp(block.networkLong, version),
                        lastIp: formatIp(block.networkLong + block.size - 1n, version),
                        type: block.type,
                        networkLong: block.networkLong // keeping for sorts
                    }
                });

                const totalParentSpace = parentBroadcastLong - parentNetworkLong + 1n;
                const utilization = Number((totalUsedIps * 10000n) / totalParentSpace) / 100;

                setResults({
                    version,
                    totalSpace: totalParentSpace.toString(),
                    usedSpace: totalUsedIps.toString(),
                    freeSpace: totalFreeIps.toString(),
                    utilization: utilization,
                    allBlocks: finalFormattedBlocks
                });
                
                showToast(`Mapped address space successfully`);
            };

            const copyToExcel = () => {
                if (!displayedResults) return;
                let text = "No.\tStatus\tSubnet\tCIDR\tTotal IPs\tStart IP\tEnd IP\n";
                text += displayedResults.map(r => `${r.no}\t${r.type}\t${r.network}\t${r.maskCidr}\t${r.sizeFormatted}\t${r.firstIp}\t${r.lastIp}`).join('\n');
                executeCopy(text, 'Space map table copied!', showToast);
            };

            return (
                <div className="animate-in fade-in duration-300">
                    <div className="bg-blue-50/50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 rounded-xl p-4 mb-8 flex gap-3 text-sm text-blue-900 dark:text-blue-100 shadow-sm">
                        <InfoIcon />
                        <div>
                            <strong className="block font-semibold mb-1">Free Space Finder</strong>
                            <p className="opacity-90 mb-1">Specify a large Parent Pool and paste in your currently assigned subnets. This tool maps out your entire address space logically, showing where your used blocks are and finding perfectly aligned free blocks in the gaps.</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
                        {/* INPUT SECTION */}
                        <div className="lg:col-span-4 bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col">
                            <div className="mb-4">
                                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">Parent Network (CIDR)</label>
                                <input 
                                    type="text" 
                                    value={parentNetwork} 
                                    onChange={(e) => setParentNetwork(e.target.value)} 
                                    onKeyDown={(e) => e.key === 'Enter' && calculateFreeSpace()}
                                    className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono" 
                                    placeholder="e.g. 10.0.0.0/8" 
                                />
                                <HistoryPills history={history} onClear={clearHistory} onSelect={setParentNetwork} />
                            </div>

                            <div className="flex-1 flex flex-col mb-4">
                                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5 flex justify-between">
                                    <span>Used Prefixes</span>
                                </label>
                                <textarea 
                                    value={usedPrefixesInput} 
                                    onChange={(e) => setUsedPrefixesInput(e.target.value)} 
                                    onKeyDown={(e) => (e.ctrlKey || e.metaKey) && e.key === 'Enter' && calculateFreeSpace()}
                                    className="w-full flex-1 min-h-[150px] bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono shadow-inner custom-scrollbar" 
                                    placeholder="e.g.&#10;10.135.8.16/28&#10;10.135.1.16/28" 
                                />
                            </div>

                            <button onClick={calculateFreeSpace} className="w-full bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold shadow-sm transition-colors focus:ring-2 focus:ring-blue-500">Map Address Space</button>
                            <div className="text-xs text-slate-400 text-center mt-2">Use Ctrl+Enter in text box to calculate</div>
                            {error && <div className="text-red-500 dark:text-red-400 text-sm mt-3 flex items-start gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg><span>{error}</span></div>}
                        </div>

                        {/* RESULTS SECTION */}
                        <div className="lg:col-span-8 flex flex-col h-full">
                            {results ? (
                                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col h-full animate-fade-in">
                                    
                                    {/* Stats Bar */}
                                    <div className="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700 p-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 w-full">
                                            <div className="flex flex-col">
                                                <span className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Total Pool IPs</span>
                                                <span className="text-lg font-bold text-slate-800 dark:text-slate-100">{results.totalSpace}</span>
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Allocated IPs</span>
                                                <span className="text-lg font-bold text-rose-600 dark:text-rose-400">{results.usedSpace}</span>
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Free IPs</span>
                                                <span className="text-lg font-bold text-emerald-600 dark:text-emerald-400">{results.freeSpace}</span>
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Utilization</span>
                                                <span className="text-lg font-bold text-slate-800 dark:text-slate-100">{results.utilization}%</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Header & Filters & Copy */}
                                    <div className="px-6 py-3 bg-white dark:bg-slate-800 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-100 dark:border-slate-700/50 gap-3">
                                        <h3 className="font-bold text-slate-800 dark:text-slate-100 hidden md:block">Address Space Map</h3>
                                        
                                        <div className="flex items-center gap-3 w-full sm:w-auto">
                                            {/* Filters */}
                                            <div className="flex bg-slate-200/50 dark:bg-slate-700/50 p-1 rounded-lg gap-1">
                                                <button 
                                                    onClick={() => setDisplayFilter('all')} 
                                                    className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${displayFilter === 'all' ? 'bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}
                                                >
                                                    All Map
                                                </button>
                                                <button 
                                                    onClick={() => setDisplayFilter('free')} 
                                                    className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${displayFilter === 'free' ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}
                                                >
                                                    Free Only
                                                </button>
                                                <button 
                                                    onClick={() => setDisplayFilter('used')} 
                                                    className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${displayFilter === 'used' ? 'bg-rose-500 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}
                                                >
                                                    Used Only
                                                </button>
                                            </div>
                                            <button onClick={copyToExcel} className="text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors shadow-sm whitespace-nowrap">
                                                <ExcelIcon /> Copy
                                            </button>
                                        </div>
                                    </div>

                                    {/* Table */}
                                    <div className="overflow-auto flex-1 custom-scrollbar" style={{maxHeight: '400px'}}>
                                        <table className="w-full text-left text-sm whitespace-nowrap">
                                            <thead className="bg-slate-50 dark:bg-slate-800/50 sticky top-0 shadow-sm z-10 border-b border-slate-200 dark:border-slate-700">
                                                <tr>
                                                    <th className="p-3 font-semibold text-slate-600 dark:text-slate-300">No.</th>
                                                    <th className="p-3 font-semibold text-slate-600 dark:text-slate-300">Status</th>
                                                    <th className="p-3 font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer" onClick={() => requestSort('network', sortConfig, setSortConfig)}>Subnet {getSortIcon('network', sortConfig)}</th>

        // ==========================================
        // MAC & EUI-64 UTILITY
        // ==========================================
        function MacUtility({ showToast }) {
            const [macInput, setMacInput] = useState('00-1A-2B-3C-4D-5E');
            const [prefixInput, setPrefixInput] = useState('fe80::/64');
            const [results, setResults] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => { calculate(); }, [macInput, prefixInput]);

            const calculate = () => {
                setError(null);
                if (!macInput.trim()) {
                    setResults(null);
                    return;
                }

                // Strip any non-hex character
                const cleanMac = macInput.replace(/[^0-9A-Fa-f]/g, '').toLowerCase();
                
                if (cleanMac.length !== 12) {
                    setError("Invalid MAC address. Must contain exactly 12 hexadecimal characters.");
                    setResults(null);
                    return;
                }

                // Generates Formats
                const formatUnix = cleanMac.match(/.{1,2}/g).join(':');
                const formatWin = cleanMac.match(/.{1,2}/g).join('-').toUpperCase();
                const formatCisco = cleanMac.match(/.{1,4}/g).join('.');

                // EUI-64 Logic
                let firstByte = parseInt(cleanMac.substring(0, 2), 16);
                firstByte = firstByte ^ 0x02; // Invert universal/local bit (7th bit)
                let modFirstByte = firstByte.toString(16).padStart(2, '0');

                // Insert FFFE in the middle
                let interfaceId = `${modFirstByte}${cleanMac.substring(2, 6)}fffe${cleanMac.substring(6, 12)}`;
                
                let blocks = [];
                for (let i = 0; i < 16; i += 4) {
                    let block = interfaceId.substring(i, i + 4);
                    // Standard IPv6 zero omission rules
                    blocks.push(parseInt(block, 16).toString(16));
                }
                let euiSuffix = blocks.join(':');

                // Prefix Formatting
                let p = prefixInput.trim() || 'fe80::';
                p = p.split('/')[0]; // Remove CIDR if present
                
                if (!p.endsWith('::')) {
                    if (p.endsWith(':')) {
                        // Keep as is
                    } else if (p.includes('::')) {
                        // Prefix has compression elsewhere, just append a colon if we are adding blocks
                        p = p + ':';
                    } else {
                        // Standard fallback
                        p = p + '::';
                    }
                }
                
                let fullIpv6 = p.endsWith('::') ? p + euiSuffix : p + euiSuffix;

                setResults({
                    cleanMac, formatUnix, formatWin, formatCisco, euiSuffix, fullIpv6
                });
            };

            const copyToExcel = () => {
                if (!results) return;
                let text = `Format\tValue\n`;
                text += `Linux/Unix (Colon)\t${results.formatUnix}\n`;
                text += `Windows (Hyphen)\t${results.formatWin}\n`;
                text += `Cisco (Dot)\t${results.formatCisco}\n`;
                text += `EUI-64 Interface ID\t${results.euiSuffix}\n`;
                text += `Full IPv6 Address\t${results.fullIpv6}`;
                executeCopy(text, 'MAC / EUI-64 Results copied!', showToast);
            };

            return (
                <div className="animate-in fade-in duration-300">
                    <div className="bg-blue-50/50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 rounded-xl p-4 mb-8 flex gap-3 text-sm text-blue-900 dark:text-blue-100 shadow-sm">
                        <InfoIcon />
                        <div>
                            <strong className="block font-semibold mb-1">MAC Address & EUI-64 Utility</strong>
                            <p className="opacity-90 mb-1">Convert MAC addresses into standardized vendor formats and dynamically generate IPv6 EUI-64 link-local or global unicast addresses.</p>
                            <ul className="list-disc pl-4 space-y-1 opacity-90">
                                <li><strong>Auto-formatting:</strong> Instantly converts between Windows (Hyphen), Unix (Colon), and Cisco (Dot) notations.</li>
                                <li><strong>Bit-Flipping:</strong> Automatically inverts the 7th bit and injects <code>FFFE</code> for accurate IPv6 SLAAC address generation.</li>
                            </ul>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 mb-8">
                        <div className="flex flex-wrap gap-6 items-end">
                            <div className="flex-1 min-w-[200px]">
                                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">
                                    MAC Address
                                </label>
                                <input 
                                    type="text" 
                                    value={macInput} 
                                    onChange={(e) => setMacInput(e.target.value)} 
                                    className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow font-mono" 
                                    placeholder="e.g. 00-1A-2B-3C-4D-5E" 
                                />
                            </div>
                            <div className="flex-1 min-w-[200px]">
                                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5">
                                    IPv6 Prefix <span className="font-normal text-slate-400 dark:text-slate-500 ml-1">(Optional)</span>
                                </label>
                                <input 
                                    type="text" 
                                    value={prefixInput} 
                                    onChange={(e) => setPrefixInput(e.target.value)} 
                                    className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-2 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow font-mono" 
                                    placeholder="e.g. fe80::/64 or 2001:db8:1::" 
                                />
                            </div>
                        </div>
                        {error && <div className="text-red-500 dark:text-red-400 text-sm mt-3 flex items-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>{error}</div>}
                    </div>

                    {results && (
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                            <div className="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex justify-between items-center">
                                <h3 className="font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                    Results
                                </h3>
                                <button 
                                    onClick={copyToExcel} 
                                    className="text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 px-3 py-1.5 rounded-md flex items-center gap-1.5 transition-colors shadow-sm"
                                >
                                    <ExcelIcon /> Copy for Excel
                                </button>
                            </div>
                            <div className="px-6 py-2">
                                <table className="w-full text-left whitespace-nowrap text-sm">
                                    <tbody>
                                        <CopyableRow label="Linux / Unix format:" value={results.formatUnix} showToast={showToast} extraData="(Colon Separated)" />
                                        <CopyableRow label="Windows format:" value={results.formatWin} showToast={showToast} extraData="(Hyphen Separated)" />
                                        <CopyableRow label="Cisco format:" value={results.formatCisco} showToast={showToast} extraData="(Dot Separated)" />
                                        
                                        <tr className="border-b border-slate-100 dark:border-slate-700/50 bg-purple-50/50 dark:bg-purple-900/10 group hover:bg-purple-100/50 dark:hover:bg-purple-900/20 transition-colors">
                                            <td className="pr-4 py-3 font-bold text-slate-800 dark:text-slate-200">EUI-64 Addr:</td>
                                            <td className="py-3 text-purple-700 dark:text-purple-400 font-mono font-bold text-base flex items-center gap-3">
                                                <span>{results.fullIpv6}</span>
                                                <button onClick={() => executeCopy(`${results.fullIpv6}`, 'EUI-64 Address copied!', showToast)} className="text-slate-400 dark:text-slate-500 hover:text-purple-600 dark:hover:text-purple-400 opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded hover:bg-purple-100 dark:hover:bg-purple-900/40"><CopyIcon /></button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
