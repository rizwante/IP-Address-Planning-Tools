<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Address Planning Tools</title>
    <!-- 
      IP Address Planning Tools
      Created by: Rizwan Ghani
      LinkedIn: www.linkedin.com/in/rizwanghani
    -->
    <meta name="author" content="Rizwan Ghani">
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Load Babel for JSX translation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <style>
        /* Smooth transition for toasts */
        .toast-enter { opacity: 0; transform: translateY(1rem); }
        .toast-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }
        .toast-exit { opacity: 1; transform: translateY(0); }
        .toast-exit-active { opacity: 0; transform: translateY(1rem); transition: opacity 300ms, transform 300ms; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .striped-bg {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.03) 10px, rgba(0,0,0,0.03) 20px);
        }
        .dark .striped-bg {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.5); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased font-sans transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- UTILS ---
        const parseIp = (str) => {
            if (!str) return null;
            str = str.trim();
            if (str.includes(':')) {
                let parts = str.split('::');
                if (parts.length > 2) return null;
                let left = parts[0] ? parts[0].split(':') : [];
                let right = parts.length === 2 && parts[1] ? parts[1].split(':') : [];
                let missing = 8 - (left.length + right.length);
                if (missing < 0) return null;
                let full = [...left];
                for(let i=0; i<missing; i++) full.push('0');
                full = full.concat(right);
                let longVal = 0n;
                for(let i=0; i<8; i++) {
                    let hex = full[i] || '0';
                    let val = parseInt(hex, 16);
                    if (isNaN(val) || val < 0 || val > 0xffff) return null;
                    longVal = (longVal << 16n) | BigInt(val);
                }
                return { version: 6, long: longVal };
            } else {
                const parts = str.split('.');
                if (parts.length !== 4) return null;
                let longVal = 0n;
                for (let i = 0; i < 4; i++) {
                    const val = parseInt(parts[i], 10);
                    if (isNaN(val) || val < 0 || val > 255) return null;
                    longVal = (longVal << 8n) | BigInt(val);
                }
                return { version: 4, long: longVal };
            }
        };

        const formatIp = (longVal, version) => {
            if (version === 6) {
                let parts = [];
                for (let i = 0; i < 8; i++) {
                    let shift = BigInt((7 - i) * 16);
                    let block = (longVal >> shift) & 0xffffn;
                    parts.push(block.toString(16));
                }
                return parts.join(':').replace(/(^|:)0(:0)*(:|$)/, '::').replace(/:{3,}/, '::');
            } else {
                return [Number((longVal >> 24n) & 255n), Number((longVal >> 16n) & 255n), Number((longVal >> 8n) & 255n), Number(longVal & 255n)].join('.');
            }
        };

        const parseMask = (str, version) => {
            if (!str) return null;
            str = str.trim().replace(/^\//, '');
            let maxBits = version === 6 ? 128 : 32;
            let bits = BigInt(maxBits);
            let cidr;
            if (!str.includes('.') && !str.includes(':')) {
                cidr = parseInt(str, 10);
                if (isNaN(cidr) || cidr < 0 || cidr > maxBits) return null;
            } else {
                const maskIp = parseIp(str);
                if (!maskIp || maskIp.version !== version) return null;
                let temp = maskIp.long; cidr = 0;
                let checkBit = 1n << (bits - 1n);
                while (temp & checkBit) { cidr++; temp = (temp << 1n) & ((1n << bits) - 1n); }
                if (temp !== 0n) return null;
            }
            let longVal = cidr === 0 ? 0n : ((1n << bits) - 1n) ^ ((1n << (bits - BigInt(cidr))) - 1n);
            return { cidr, long: longVal };
        };

        const LinkedInIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
        );

        // --- MAIN APP ---
        function App() {
            const [activeTab, setActiveTab] = useState('calc');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [ip, setIp] = useState('192.168.1.1');
            const [mask, setMask] = useState('24');
            const [results, setResults] = useState(null);

            useEffect(() => {
                const calculate = () => {
                    const ipData = parseIp(ip);
                    if (!ipData) return;
                    const maskData = parseMask(mask, ipData.version);
                    if (!maskData) return;
                    const network = ipData.long & maskData.long;
                    const broadcast = network | (~maskData.long & ((1n << (ipData.version === 6 ? 128n : 32n)) - 1n));
                    setResults({ 
                        network: formatIp(network, ipData.version), 
                        broadcast: formatIp(broadcast, ipData.version),
                        cidr: maskData.cidr 
                    });
                };
                calculate();
            }, [ip, mask]);

            return (
                <div className="min-h-screen p-4 md:p-12 flex flex-col items-center">
                    <header className="w-full max-w-4xl mb-8 flex justify-between items-center">
                        <div>
                            <h1 className="text-3xl font-black text-slate-800 dark:text-white">IP Address Planning Tools</h1>
                            <p className="text-slate-500 flex items-center gap-2 mt-1">
                                Developed by <span className="font-bold text-slate-700 dark:text-slate-300">Rizwan Ghani</span>
                                <a href="https://www.linkedin.com/in/rizwanghani" target="_blank" className="text-blue-500 hover:underline flex items-center gap-1 ml-2">
                                    <LinkedInIcon /> Connect
                                </a>
                            </p>
                        </div>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700">
                            {isDarkMode ? '🌙' : '☀️'}
                        </button>
                    </header>

                    <main className="w-full max-w-4xl bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div>
                                <label className="block text-sm font-bold mb-2">IP Address</label>
                                <input value={ip} onChange={e => setIp(e.target.value)} className="w-full p-3 rounded-xl border border-slate-300 dark:bg-slate-900 dark:border-slate-600 font-mono" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-2">Mask (CIDR or Decimal)</label>
                                <input value={mask} onChange={e => setMask(e.target.value)} className="w-full p-3 rounded-xl border border-slate-300 dark:bg-slate-900 dark:border-slate-600 font-mono" />
                            </div>
                        </div>

                        {results && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-800">
                                    <span className="text-xs font-bold uppercase tracking-widest text-blue-600 block mb-1">Network Address</span>
                                    <span className="text-2xl font-mono font-black">{results.network}/{results.cidr}</span>
                                </div>
                                <div className="p-4 bg-slate-50 dark:bg-slate-900/40 rounded-xl border border-slate-200 dark:border-slate-700">
                                    <span className="text-xs font-bold uppercase tracking-widest text-slate-500 block mb-1">Broadcast Address</span>
                                    <span className="text-xl font-mono">{results.broadcast}</span>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-12 text-center text-slate-500 text-sm">
                        <p>Developed by Rizwan Ghani</p>
                        <a href="https://www.linkedin.com/in/rizwanghani" target="_blank" className="flex items-center justify-center gap-1 mt-1 text-blue-500 hover:underline">
                            <LinkedInIcon /> linkedin.com/in/rizwanghani
                        </a>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
